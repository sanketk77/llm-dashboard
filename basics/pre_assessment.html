<!DOCTYPE html>
<html lang="en">
<head>
    <script src="scormdriver.js"></script>
    <script src="APIWrapper.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Basic — Pre-Assessment</title>
    <style>
        :root {
            --primary: #1a73e8;
            --primary-light: #e8f0fe;
            --primary-dark: #1557b0;
            --success: #1e8e3e;
            --success-light: #f1f8e9;
            --error: #d32f2f;
            --error-light: #ffebee;
            --bg: #f8f9fa;
            --bg-light: #ffffff;
            --text-main: #202124;
            --text-sub: #5f6368;
            --text-light: #80868b;
            --border: #dadce0;
            --shadow: 0 2px 8px rgba(0,0,0,0.1);
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }

        html, body {
            height: 100%;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #f8f9fa 0%, #f0f4f8 100%);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 280px;
            background: var(--bg-light);
            border-right: 1px solid var(--border);
            padding: 0;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 24px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(135deg, #f8f9fa 0%, #ffffff 100%);
        }

        .sidebar-logo {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .logo-img {
            width: 160px;
            height: auto;
            display: block;
            filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.1));
            transition: transform 0.3s ease;
        }

        .logo-img:hover {
            transform: scale(1.05);
        }

        .sidebar-content {
            padding: 30px 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .timer-section {
            background: linear-gradient(135deg, var(--primary-light) 0%, #f0f7ff 100%);
            padding: 20px;
            border-radius: 12px;
            border-left: 4px solid var(--primary);
        }

        .timer-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .timer-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
            font-variant-numeric: tabular-nums;
            transition: color 0.3s ease;
        }

        .timer-value.warning {
            color: #f57c00;
        }

        .timer-value.critical {
            color: var(--error);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .answered-section {
            background: linear-gradient(135deg, var(--success-light) 0%, #f1f8e9 100%);
            padding: 20px;
            border-radius: 12px;
            border-left: 4px solid var(--success);
        }

        .answered-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .answered-count {
            font-size: 24px;
            font-weight: 700;
            color: var(--success);
        }

        .sidebar-nav {
            margin-top: auto;
        }

        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            text-decoration: none;
            color: var(--text-main);
            border-radius: 8px;
            transition: all 0.3s ease;
            font-size: 14px;
            font-weight: 500;
        }

        .sidebar-nav a:hover {
            background: var(--primary-light);
            color: var(--primary);
            transform: translateX(-4px);
        }

        /* ===== MAIN CONTENT ===== */
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 40px;
            overflow-y: auto;
            max-width: 900px;
        }

        .header {
            margin-bottom: 40px;
            animation: fadeInDown 0.5s ease;
        }

        .badge {
            display: inline-block;
            font-size: 11px;
            font-weight: 700;
            padding: 6px 14px;
            border-radius: 20px;
            background: linear-gradient(135deg, var(--primary-light) 0%, #d2e3fc 100%);
            color: var(--primary);
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 2px 4px rgba(26, 115, 232, 0.1);
        }

        .header h1 {
            font-size: 36px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .header p {
            font-size: 16px;
            color: var(--text-sub);
            line-height: 1.6;
        }

        /* ===== PROGRESS BAR ===== */
        .progress-container {
            margin-bottom: 40px;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .progress-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-main);
        }

        .progress-percentage {
            font-size: 13px;
            font-weight: 700;
            color: var(--primary);
        }

        .progress-bar {
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary) 0%, var(--primary-dark) 100%);
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 4px;
            position: relative;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* ===== QUESTION CARD ===== */
        .qcard {
            background: var(--bg-light);
            border-radius: 16px;
            padding: 32px;
            box-shadow: var(--shadow);
            display: none;
            border: 1px solid var(--border);
            min-height: 500px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            animation: fadeIn 0.4s ease;
        }

        .qcard.active {
            display: flex;
        }

        .qcard-header {
            margin-bottom: 32px;
        }

        .topic-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            display: block;
        }

        .qnum {
            font-size: 13px;
            color: var(--text-light);
            font-weight: 600;
            margin-bottom: 16px;
        }

        .qtext {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 0;
            line-height: 1.5;
            letter-spacing: -0.3px;
        }

        .qcard-content {
            flex: 1;
        }

        /* ===== OPTIONS ===== */
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 28px;
        }

        .opt {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 20px;
            border-radius: 12px;
            border: 2px solid var(--border);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: var(--bg-light);
            position: relative;
            overflow: hidden;
        }

        .opt::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.4s ease;
        }

        .opt:hover {
            border-color: var(--primary);
            background: var(--primary-light);
            transform: translateX(4px);
            box-shadow: 0 4px 12px rgba(26, 115, 232, 0.15);
        }

        .opt:hover::before {
            left: 100%;
        }

        .opt.selected {
            background: var(--primary-light);
            border-color: var(--primary);
            box-shadow: 0 4px 12px rgba(26, 115, 232, 0.2);
        }

        .olabel {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            color: var(--text-main);
            background: var(--bg);
            flex-shrink: 0;
            transition: all 0.3s ease;
        }

        .opt.selected .olabel {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 2px 8px rgba(26, 115, 232, 0.3);
        }

        .otext {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-main);
            line-height: 1.4;
        }

        /* ===== CONTROLS ===== */
        .nav-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
        }

        button {
            padding: 12px 28px;
            border-radius: 8px;
            border: 2px solid var(--border);
            background: var(--bg-light);
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            min-height: 44px;
            color: var(--text-main);
        }

        button:hover:not(:disabled) {
            border-color: var(--primary);
            color: var(--primary);
            background: var(--primary-light);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(26, 115, 232, 0.2);
        }

        button:active:not(:disabled) {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-submit {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            box-shadow: 0 4px 12px rgba(26, 115, 232, 0.3);
            font-weight: 700;
        }

        .btn-submit:hover {
            box-shadow: 0 6px 16px rgba(26, 115, 232, 0.4);
            transform: translateY(-2px);
        }

        #submit-row {
            display: none;
        }

        /* ===== RESULTS ===== */
        #results {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .results-header {
            text-align: center;
            padding: 40px;
            background: var(--bg-light);
            border-radius: 16px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            margin-bottom: 32px;
        }

        .results-header h2 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--text-main);
        }

        .score-big {
            font-size: 56px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 16px;
            letter-spacing: -1px;
        }

        .results-subtitle {
            font-size: 16px;
            color: var(--text-sub);
            line-height: 1.6;
        }

        .result-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin: 32px 0;
        }

        .stat-card {
            background: var(--bg-light);
            padding: 24px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin: 40px 0;
            flex-wrap: wrap;
        }

        .action-buttons .btn-submit {
            padding: 14px 32px;
            font-size: 15px;
        }

        .review-section {
            margin-top: 40px;
        }

        .review-section h3 {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 2px solid var(--border);
        }

        .review-card {
            background: var(--bg-light);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            border-left: 5px solid var(--border);
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
        }

        .review-card:hover {
            box-shadow: var(--shadow-lg);
            transform: translateX(4px);
        }

        .review-card.correct {
            border-left-color: var(--success);
            background: linear-gradient(135deg, var(--bg-light) 0%, var(--success-light) 100%);
        }

        .review-card.incorrect {
            border-left-color: var(--error);
            background: linear-gradient(135deg, var(--bg-light) 0%, var(--error-light) 100%);
        }

        .review-qtext {
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 12px;
            color: var(--text-main);
        }

        .review-item {
            font-size: 14px;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .review-item.correct {
            color: var(--success);
            font-weight: 600;
        }

        .review-item.incorrect {
            color: var(--error);
        }

        .exp-box {
            background: rgba(255,255,255,0.6);
            padding: 12px 16px;
            border-radius: 8px;
            margin-top: 12px;
            font-size: 13px;
            color: var(--text-sub);
            border-left: 3px solid var(--primary);
            line-height: 1.5;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 1024px) {
            .sidebar {
                width: 260px;
            }

            .main-content {
                margin-left: 260px;
                padding: 30px;
            }

            .header h1 {
                font-size: 28px;
            }

            .qcard {
                padding: 24px;
                min-height: 450px;
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: static;
                border-right: none;
                border-bottom: 1px solid var(--border);
            }

            .sidebar-content {
                flex-direction: row;
                gap: 20px;
            }

            .main-content {
                margin-left: 0;
                padding: 20px;
                max-width: 100%;
            }

            .header h1 {
                font-size: 24px;
            }

            .qcard {
                padding: 20px;
                min-height: auto;
            }

            .nav-controls {
                flex-direction: column;
                gap: 12px;
            }

            button {
                width: 100%;
                justify-content: center;
            }

            .result-grid {
                grid-template-columns: 1fr;
            }

            .action-buttons {
                flex-direction: column;
            }

            .action-buttons .btn-submit {
                width: 100%;
            }
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-light);
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">
        <div class="sidebar-logo">
            <img src="jade_logo.webp" alt="Jade Global Logo" class="logo-img">
        </div>
    </div>

    <div class="sidebar-content">
        <div class="timer-section">
            <div class="timer-label">⏱ Time Remaining</div>
            <div id="qtimer" class="timer-value">20:00</div>
        </div>

        <div class="answered-section">
            <div class="answered-label">✓ Answered</div>
            <div class="answered-count" id="ans-num">0 / 20</div>
        </div>

        <nav class="sidebar-nav" style="margin-top: auto;">
            <a href="../index.html">← Exit to Dashboard</a>
        </nav>
    </div>
</div>

<div class="main-content">
    <div id="quiz-ui">
        <div class="header">
            <div class="badge">Module 1-3: Basics</div>
            <h1>Pre-Assessment</h1>
            <p>This diagnostic helps us understand your starting point. Answer naturally based on what you know now.</p>
        </div>

        <div class="progress-container">
            <div class="progress-info">
                <span class="progress-label">Progress</span>
                <span class="progress-percentage" id="prog-text">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="prog" style="width: 0%"></div>
            </div>
        </div>

        <div id="questions-container"></div>

        <div class="nav-controls">
            <button id="prev-btn" onclick="nav(-1)" disabled>← Previous</button>
            <div id="submit-row">
                <button class="btn-submit" onclick="submitAssessment()">Check My Results →</button>
            </div>
            <button id="next-btn" onclick="nav(1)">Next →</button>
        </div>
    </div>

    <div id="results"></div>
</div>

<script>
const QS = [
    {
        topic:"Introduction to AI", tc:"t-ai",
        q:"What is Artificial Intelligence (AI) primarily designed to do?",
        opts:["Replace human physical labor completely","Make machines think and learn from data like humans","Operate only when connected to a printer","Fix broken computer hardware automatically"],
        ans:1,
        exp:"AI mimics human intelligence by understanding information, learning from data, and making predictions[cite: 437, 443]."
    },
    {
        topic:"Introduction to AI", tc:"t-ai",
        q:"Which of these is a real-world example of 'Narrow AI' used daily?",
        opts:["A standard wall clock","Voice assistants like Siri or Alexa","A manual bicycle","A theoretical machine with emotions"],
        ans:1,
        exp:"Narrow AI (ANI) is designed for specific tasks like voice recognition or spam filtering[cite: 477, 481]."
    },
    {
        topic:"NLP Fundamentals", tc:"t-nlp",
        q:"In NLP, what is the process of breaking text into smaller units (tokens)?",
        opts:["Slicing","Tokenization","Sorting","Grouping"],
        ans:1,
        exp:"Tokenization is the first step in the NLP pipeline, breaking raw text into chunks a computer can process[cite: 569, 583]."
    },
    {
        topic:"What are LLMs", tc:"t-llm",
        q:"What does 'LLM' stand for?",
        opts:["Logical Learning Machine","Large Language Model","Linked Language Matrix","Long Linear Method"],
        ans:1,
        exp:"Large Language Models are trained on trillions of tokens to generate human-like text[cite: 662, 668]."
    },
    {
        topic:"What are LLMs", tc:"t-llm",
        q:"Which model was released by Google in 2024?",
        opts:["ChatGPT","Claude","Gemini","LLaMA"],
        ans:2,
        exp:"Gemini is a multimodal model released by Google in 2024[cite: 52, 728]."
    },
    {
        topic:"LLM Applications", tc:"t-app",
        q:"What is a major business use case for LLMs?",
        opts:["Hardware cleaning","Summarizing long documents","Office temperature control","Physical mail sorting"],
        ans:1,
        exp:"LLMs excel at summarization, text generation, and question answering[cite: 159, 175]."
    },
    {
        topic:"LLM Applications", tc:"t-app",
        q:"Which industry uses LLMs for clinical note drafting?",
        opts:["Healthcare","Retail","Construction","Manufacturing"],
        ans:0,
        exp:"Healthcare providers like Epic use LLMs to generate clinical notes and summarize patient records[cite: 206, 207]."
    },
    {
        topic:"Prompt Basics", tc:"t-prompt",
        q:"What is a 'Prompt'?",
        opts:["A hardware component","An instruction or question given to an LLM","A software bug","A database storage unit"],
        ans:1,
        exp:"A prompt is any input (instruction, context, or data) that tells an LLM what to do[cite: 265, 269]."
    },
    {
        topic:"Prompt Basics", tc:"t-prompt",
        q:"What phrase dramatically improves an LLM's reasoning quality?",
        opts:["'Be fast'","'Let's think step by step'","'Don't fail'","'Skip details'"],
        ans:1,
        exp:"Adding 'Let's think step by step' triggers Chain of Thought (CoT) reasoning[cite: 308, 312]."
    },
    {
        topic:"Introduction to AI", tc:"t-ai",
        q:"What is the relationship between AI and Machine Learning (ML)?",
        opts:["They are the same thing","ML is a subset of AI","AI is a subset of ML","They are unrelated"],
        ans:1,
        exp:"Machine Learning is a subset of AI focused on learning patterns from data[cite: 460, 461]."
    },
    {
        topic:"What are LLMs", tc:"t-llm",
        q:"What is an LLM 'parameter'?",
        opts:["A user prompt","An internal variable the model learns during training","A safety filter","A training dataset name"],
        ans:1,
        exp:"Parameters are internal weights the model learns; GPT-4 has roughly 1.8 trillion[cite: 675, 676]."
    },
    {
        topic:"Transformer Architecture", tc:"t-trans",
        q:"In what year was the 'Transformer' architecture introduced?",
        opts:["1950","2012","2017","2022"],
        ans:2,
        exp:"The paper 'Attention is All You Need' introduced Transformers in 2017[cite: 35, 517]."
    },
    {
        topic:"Transformer Architecture", tc:"t-trans",
        q:"What is the 'secret sauce' that allows Transformers to process context better than older RNNs?",
        opts:["Faster hard drives","Attention mechanism","Larger vocabularies","Shorter prompts"],
        ans:1,
        exp:"The attention mechanism allows the model to look at ALL words in a sentence to find relevance[cite: 49, 54]."
    },
    {
        topic:"NLP Fundamentals", tc:"t-nlp",
        q:"Which task involves detecting if a review is 'Positive' or 'Negative'?",
        opts:["Translation","Summarization","Sentiment Analysis","Parsing"],
        ans:2,
        exp:"Sentiment analysis is a core NLP task used to extract the emotional intent of text[cite: 194, 640]."
    },
    {
        topic:"What are LLMs", tc:"t-llm",
        q:"When an LLM confidently states factually incorrect info, it is called:",
        opts:["A update","A hallucination","A logical skip","A speed boost"],
        ans:1,
        exp:"Hallucination is a primary limitation where LLMs generate false facts convincingly[cite: 760, 785]."
    },
    {
        topic:"LLM Applications", tc:"t-app",
        q:"What does 'Multimodal' mean for an LLM?",
        opts:["It can speak many languages","It can process text, images, and audio","It runs on multiple servers","It has multiple user accounts"],
        ans:1,
        exp:"Multimodal models like Gemini can see, hear, and reason across different data types[cite: 238, 243]."
    },
    {
        topic:"Prompt Basics", tc:"t-prompt",
        q:"Which prompting strategy uses 2-5 examples to teach a pattern?",
        opts:["Zero-shot","Few-shot","Instant-shot","Multi-shot"],
        ans:1,
        exp:"Few-shot prompting provides examples before the task to improve results for nuanced patterns[cite: 298, 299]."
    },
    {
        topic:"Introduction to AI", tc:"t-ai",
        q:"Which type of AI is designed for one specific task (like chess)?",
        opts:["General AI","Super AI","Narrow AI","Universal AI"],
        ans:2,
        exp:"Narrow AI (ANI) is designed for specific tasks and is the type of AI we use today[cite: 477, 479]."
    },
    {
        topic:"NLP Fundamentals", tc:"t-nlp",
        q:"GPT uses vectors (numbers) to represent words. This is called:",
        opts:["Alphabetizing","Embeddings","Dictionary mapping","Hardcoding"],
        ans:1,
        exp:"Embeddings turn words into numerical vectors that capture their semantic meaning[cite: 615, 618]."
    },
    {
        topic:"What are LLMs", tc:"t-llm",
        q:"Which organization developed LLaMA 3?",
        opts:["OpenAI","Google","Meta","Anthropic"],
        ans:2,
        exp:"LLaMA 3 is an open-source model developed by Meta[cite: 734, 735]."
    }
];

let current = 0;
let answered = {};
let submitted = false;
let timeLeft = 20 * 60;
let timerInt;

function buildQuestions() {
    const c = document.getElementById('questions-container');
    QS.forEach((q, i) => {
        const d = document.createElement('div');
        d.className = 'qcard' + (i === 0 ? ' active' : '');
        d.id = 'q' + i;
        d.innerHTML = `
            <div class="qcard-header">
                <div class="topic-label">📌 ${q.topic}</div>
                <div class="qnum">Question ${i+1} of ${QS.length}</div>
                <div class="qtext">${q.q}</div>
            </div>
            <div class="qcard-content">
                <div class="options" id="opts${i}">
                    ${q.opts.map((o, j) => `
                        <div class="opt" id="opt${i}_${j}" onclick="selectOpt(${i},${j})">
                            <div class="olabel">${String.fromCharCode(65+j)}</div>
                            <div class="otext">${o}</div>
                        </div>`).join('')}
                </div>
            </div>`;
        c.appendChild(d);
    });
}

function selectOpt(qi, oi) {
    if (submitted) return;
    answered[qi] = oi;
    document.querySelectorAll(`#opts${qi} .opt`).forEach((el, j) => el.classList.toggle('selected', j === oi));
    
    const answeredCount = Object.keys(answered).length;
    document.getElementById('ans-num').textContent = `${answeredCount} / ${QS.length}`;
    
    const progPct = Math.round((answeredCount / QS.length) * 100);
    document.getElementById('prog').style.width = progPct + '%';
    document.getElementById('prog-text').textContent = progPct + '%';
    
    if (answeredCount >= 15) {
        document.getElementById('submit-row').style.display = 'block';
    }
}

function nav(dir) {
    document.getElementById('q' + current).classList.remove('active');
    current = Math.max(0, Math.min(QS.length - 1, current + dir));
    document.getElementById('q' + current).classList.add('active');
    document.getElementById('prev-btn').disabled = (current === 0);
    document.getElementById('next-btn').disabled = (current === QS.length - 1);
}

function submitAssessment() {
    if(submitted) return;
    submitted = true;
    clearInterval(timerInt);
    localStorage.setItem('basics_pre_completed', 'true');
    showResults();
}

function showResults() {
    document.getElementById('quiz-ui').style.display = 'none';
    const r = document.getElementById('results');
    r.style.display = 'block';
    
    let correct = 0;
    QS.forEach((q, i) => { if (answered[i] === q.ans) correct++; });
    const pct = Math.round((correct / QS.length) * 100);

    const timeSpentSec = (20 * 60) - timeLeft;
    const m = Math.floor(timeSpentSec / 60), s = timeSpentSec % 60;
    const timeStr = `${m}:${s < 10 ? '0' : ''}${s}`;

    r.innerHTML = `
        <div class="results-header">
            <h2>🎉 Pre-Assessment Complete</h2>
            <div class="score-big">${pct}%</div>
            <p class="results-subtitle">Your baseline is set. Learning content is now unlocked.</p>
        </div>

        <div class="result-grid">
            <div class="stat-card">
                <div class="stat-value">${correct}</div>
                <div class="stat-label">Correct</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">${QS.length - correct}</div>
                <div class="stat-label">Incorrect</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">${timeStr}</div>
                <div class="stat-label">Time Taken</div>
            </div>
        </div>

        <div class="action-buttons">
            <button class="btn-submit" onclick="window.location.href='content.html'">📚 Go to Learning Content →</button>
        </div>

        <div class="review-section">
            <h3>📋 Review Your Answers</h3>
            ${QS.map((q, i) => {
                const ua = answered[i];
                const ok = ua === q.ans;
                return `
                <div class="review-card ${ok ? 'correct' : 'incorrect'}">
                    <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 12px;">
                        <span style="font-size: 18px;">${ok ? '✓' : '✗'}</span>
                        <div class="review-qtext">Question ${i + 1}</div>
                    </div>
                    <div style="font-weight: 600; margin-bottom: 12px; color: var(--text-main);">${q.q}</div>
                    <div class="review-item">Your Answer: <strong>${ua !== undefined ? q.opts[ua] : 'Not answered'}</strong></div>
                    ${!ok ? `<div class="review-item correct">✓ Correct: ${q.opts[q.ans]}</div>` : ''}
                    <div class="exp-box">💡 ${q.exp}</div>
                </div>`;
            }).join('')}
        </div>
    `;
}

function startTimer() {
    timerInt = setInterval(() => {
        timeLeft--;
        const m = Math.floor(timeLeft / 60), s = timeLeft % 60;
        const timerDisplay = document.getElementById('qtimer');
        timerDisplay.textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
        
        if (timeLeft <= 60) {
            timerDisplay.classList.add('warning');
        }
        if (timeLeft <= 30) {
            timerDisplay.classList.remove('warning');
            timerDisplay.classList.add('critical');
        }
        
        if (timeLeft <= 0) {
            clearInterval(timerInt);
            alert("⏱ Time is up! Submitting your answers...");
            submitAssessment();
        }
    }, 1000);
}

window.onload = function() {
    buildQuestions();
    startTimer();
}
</script>
</body>
</html>
