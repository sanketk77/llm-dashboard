<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Basics — Learning Materials</title>

    <style>
        :root {
            --primary: #1a73e8;
            --bg: #f8f9fa;
            --text-main: #202124;
            --text-sub: #5f6368;
            --white: #ffffff;
            --border: #e0e0e0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: Arial, sans-serif;
            background: var(--bg);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
        }

        .sidebar-header {
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 20px;
        }

        .sidebar-logo {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .logo-img {
            width: 180px;
            height: auto;
            display: block;
            filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.1));
        }

        .main-content {
            flex: 1;
            padding: 3rem;
            margin-left: 260px;
            max-width: 1100px;
        }

        .header { margin-bottom: 2rem; }

        .badge {
            font-size: 11px;
            font-weight: bold;
            padding: 4px 12px;
            border-radius: 4px;
            background: #e8f0fe;
            color: #1967d2;
            margin-bottom: 1rem;
            display: inline-block;
        }

        .mode-selector {
            display: flex;
            background: #eee;
            padding: 4px;
            border-radius: 10px;
            margin-bottom: 2rem;
        }

        .mode-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: transparent;
        }

        .mode-btn.active {
            background: white;
            color: var(--primary);
        }

        .content-area { display: none; }
        .content-area.active { display: block; }

        .card {
            background: var(--white);
            border-radius: 16px;
            padding: 1.5rem;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .card h3 {
            margin-bottom: 1rem;
        }

        video {
            width: 100%;
            border-radius: 12px;
        }

        /* LARGE PDF CONTAINER */
        .pdf-container {
            width: 100%;
            height: 1200px;
            border: 2px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            background: #fff;
            position: relative;
        }

        .pdf-container iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        .pdf-loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-sub);
            font-size: 16px;
        }

        .footer-nav {
            margin-top: 30px;
            display: flex;
            gap: 20px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 6px;
            text-decoration: none;
            cursor: pointer;
            border: none;
            font-size: 14px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-outline {
            border: 1px solid var(--border);
            background: white;
            color: var(--text-main);
        }

        .btn:hover {
            opacity: 0.9;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="sidebar">
   <div class="sidebar-header">
    <div class="sidebar-logo">
        <img src="jade_logo.png" alt="Jade Global Logo" class="logo-img">
    </div>
</div>

    <div style="margin-top: 30px;">
        <p style="font-size: 12px; color: var(--text-sub);">Current Level</p>
        <p style="color: var(--primary); font-weight: bold;">LLM Basics</p>
    </div>

    <a href="../index.html" style="margin-top: 30px; display:block;">← Back to Dashboard</a>
</div>

<div class="main-content">

    <div class="header">
        <div class="badge">Learning Materials</div>
        <h1>Fundamentals of LLMs</h1>
        <p style="color: var(--text-sub);">
            Watch the session or go through slides before attempting quiz.
        </p>
    </div>

    <!-- TOGGLE -->
    <div class="mode-selector">
        <button class="mode-btn active" onclick="switchMode('video', this)">🎥 Video</button>
        <button class="mode-btn" onclick="switchMode('ppt', this)">📄 Slides</button>
    </div>

    <!-- VIDEO -->
    <div id="video-content" class="content-area active">
        <div class="card">
            <h3>Video Lecture</h3>

            <video controls>
                <source src="https://res.cloudinary.com/dj3shi5ju/video/upload/v1774863371/uemx7jw5jftvmilzpejj.mp4" type="video/mp4">
            </video>

            <div style="margin-top:15px;">
                <strong>Learning Objectives:</strong>
                <ul style="margin-left:20px;">
                    <li>Intro to NLP</li>
                    <li>Transformers</li>
                    <li>Tokenization</li>
                </ul>
            </div>
        </div>
    </div>

    <!-- PDF SECTION - LARGE CONTAINER -->
   <div class="pdf-container">
    <iframe 
        src="https://drive.google.com/file/d/1g6UAeAvDuP4jirulsl1ZaIJ_4geJH17r/view?usp=sharing"
        title="Technical Slides PDF">
    </iframe>
</div>

    <!-- FOOTER -->
    <div class="footer-nav">
        <a href="../index.html" class="btn btn-outline">Back</a>
        <button class="btn btn-primary" onclick="goNext()">Continue</button>
    </div>

</div>

function switchMode(mode, btn) {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    document.querySelectorAll('.content-area').forEach(c => c.classList.remove('active'));
    document.getElementById(mode + '-content').classList.add('active');
}

function goNext() {
    // Mark content as viewed/completed
    localStorage.setItem('basics_content_completed', 'true');
    
    // Proceed to Post-Assessment
    window.location.href = "post_assessment.html";
}
</script>

</body>
</html>
