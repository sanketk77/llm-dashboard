<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Basics — Learning Materials</title>

    <style>
        :root {
            --primary: #1a73e8;
            --bg: #f8f9fa;
            --text-main: #202124;
            --text-sub: #5f6368;
            --white: #ffffff;
            --border: #e0e0e0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: Arial, sans-serif;
            background: var(--bg);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 260px;
            background: var(--white);
            border-right: 1px solid var(--border);
            padding: 2rem 1.5rem;
            position: fixed;
            height: 100vh;
        }

        .main-content {
            flex: 1;
            padding: 3rem;
            margin-left: 260px;
            max-width: 1100px;
        }

        .header { margin-bottom: 2rem; }

        .badge {
            font-size: 11px;
            font-weight: bold;
            padding: 4px 12px;
            border-radius: 4px;
            background: #e8f0fe;
            color: #1967d2;
            margin-bottom: 1rem;
            display: inline-block;
        }

        .mode-selector {
            display: flex;
            background: #eee;
            padding: 4px;
            border-radius: 10px;
            margin-bottom: 2rem;
        }

        .mode-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: transparent;
        }

        .mode-btn.active {
            background: white;
            color: var(--primary);
        }

        .content-area { display: none; }
        .content-area.active { display: block; }

        .card {
            background: var(--white);
            border-radius: 16px;
            padding: 1.5rem;
            border: 1px solid var(--border);
        }

        video {
            width: 100%;
            border-radius: 12px;
        }

        .pdf-container {
            width: 100%;
            height: 700px;
        }

        .footer-nav {
            margin-top: 30px;
            display: flex;
            gap: 20px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 6px;
            text-decoration: none;
            cursor: pointer;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
        }

        .btn-outline {
            border: 1px solid var(--border);
            background: white;
        }
    </style>
</head>

<body>

<div class="sidebar">
    <h3 style="color: var(--primary);">JADE GLOBAL AI</h3>

    <div style="margin-top: 30px;">
        <p style="font-size: 12px; color: var(--text-sub);">Current Level</p>
        <p style="color: var(--primary); font-weight: bold;">LLM Basics</p>
    </div>

    <a href="../index.html" style="margin-top: 30px; display:block;">← Back to Dashboard</a>
</div>

<div class="main-content">

    <div class="header">
        <div class="badge">Learning Materials</div>
        <h1>Fundamentals of LLMs</h1>
        <p style="color: var(--text-sub);">
            Watch the session or go through slides before attempting quiz.
        </p>
    </div>

    <!-- TOGGLE -->
    <div class="mode-selector">
        <button class="mode-btn active" onclick="switchMode('video', this)">🎥 Video</button>
        <button class="mode-btn" onclick="switchMode('ppt', this)">📄 Slides</button>
    </div>

    <!-- VIDEO -->
    <div id="video-content" class="content-area active">
        <div class="card">
            <h3>Video Lecture</h3>

            <video controls>
                <source src="https://res.cloudinary.com/dj3shi5ju/video/upload/v1774863371/uemx7jw5jftvmilzpejj.mp4" type="video/mp4">
            </video>

            <div style="margin-top:15px;">
                <strong>Learning Objectives:</strong>
                <ul style="margin-left:20px;">
                    <li>Intro to NLP</li>
                    <li>Transformers</li>
                    <li>Tokenization</li>
                </ul>
            </div>
        </div>
    </div>

    <!-- PDF -->
    <div id="ppt-content" class="content-area">
        <div class="card">
            <h3>Technical Slides</h3>

            <div class="pdf-container">
                <embed src="LLM_BASIC_Content.pdf" width="100%" height="100%">
            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <div class="footer-nav">
        <a href="../index.html" class="btn btn-outline">Back</a>
        <button class="btn btn-primary" onclick="goNext()">Continue</button>
    </div>

</div>

<script>
function switchMode(mode, btn) {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    document.querySelectorAll('.content-area').forEach(c => c.classList.remove('active'));
    document.getElementById(mode + '-content').classList.add('active');
}

function goNext() {
    window.location.href = "post_assessment.html";
}
</script>

</body>
</html>
