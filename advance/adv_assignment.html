<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced — Engineering Assignment</title>
    
    <script src="../scormdriver.js"></script>
    <script src="../APIWrapper.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/dracula.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/python/python.min.js"></script>

    <style>
        :root {
            --primary: #1a73e8;
            --primary-light: #e8f0fe;
            --primary-dark: #1557b0;
            --success: #1e8e3e;
            --success-light: #f1f8e9;
            --warning: #f57c00;
            --error: #d32f2f;
            --error-light: #ffebee;
            --bg: #f8f9fa;
            --bg-light: #ffffff;
            --text-main: #202124;
            --text-sub: #5f6368;
            --text-light: #80868b;
            --border: #dadce0;
            --code-bg: #282c34;
            --shadow: 0 2px 8px rgba(0,0,0,0.1);
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }

        html, body {
            height: 100%;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #f8f9fa 0%, #f0f4f8 100%);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 280px;
            background: var(--bg-light);
            border-right: 1px solid var(--border);
            padding: 0;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 24px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(135deg, #f8f9fa 0%, #ffffff 100%);
        }

        .sidebar-logo {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .logo-img {
            width: 160px;
            height: auto;
            display: block;
            filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.1));
            transition: transform 0.3s ease;
        }

        .logo-img:hover {
            transform: scale(1.05);
        }

        .sidebar-content {
            padding: 30px 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .progress-section {
            background: linear-gradient(135deg, var(--primary-light) 0%, #f0f7ff 100%);
            padding: 20px;
            border-radius: 12px;
            border-left: 4px solid var(--primary);
        }

        .progress-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .progress-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
        }

        .progress-bar-small {
            width: 100%;
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            margin-top: 12px;
            overflow: hidden;
        }

        .progress-fill-small {
            height: 100%;
            background: linear-gradient(90deg, var(--primary) 0%, var(--primary-dark) 100%);
            transition: width 0.4s ease;
        }

        .sidebar-nav {
            margin-top: auto;
        }

        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            text-decoration: none;
            color: var(--text-main);
            border-radius: 8px;
            transition: all 0.3s ease;
            font-size: 14px;
            font-weight: 500;
        }

        .sidebar-nav a:hover {
            background: var(--primary-light);
            color: var(--primary);
            transform: translateX(-4px);
        }

        /* ===== MAIN CONTENT ===== */
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 40px;
            overflow-y: auto;
            max-width: 1100px;
        }

        .header {
            margin-bottom: 40px;
            animation: fadeInDown 0.5s ease;
        }

        .badge {
            display: inline-block;
            font-size: 11px;
            font-weight: 700;
            padding: 6px 14px;
            border-radius: 20px;
            background: linear-gradient(135deg, var(--primary-light) 0%, #d2e3fc 100%);
            color: var(--primary);
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 2px 4px rgba(26, 115, 232, 0.1);
        }

        .header h1 {
            font-size: 36px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .header p {
            font-size: 16px;
            color: var(--text-sub);
            line-height: 1.6;
        }

        /* ===== ASSIGNMENT CARD ===== */
        .assignment-card {
            background: var(--bg-light);
            border-radius: 16px;
            padding: 32px;
            box-shadow: var(--shadow);
            display: none;
            border: 1px solid var(--border);
            animation: fadeIn 0.4s ease;
        }

        .assignment-card.active {
            display: block;
        }

        .task-topic {
            display: inline-block;
            font-size: 11px;
            font-weight: 700;
            padding: 6px 14px;
            border-radius: 6px;
            background: var(--primary-light);
            color: var(--primary);
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .instruction {
            font-size: 16px;
            line-height: 1.6;
            color: var(--text-main);
            margin-bottom: 24px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
            border-left: 4px solid var(--primary);
        }
        
        .instruction ul {
            margin-left: 24px;
            margin-top: 8px;
        }

        .editor-section {
            margin-bottom: 24px;
        }

        .editor-label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .editor-info {
            font-size: 12px;
            color: var(--text-light);
            margin-bottom: 8px;
        }

        /* ===== CODE EDITOR ===== */
        .editor-wrapper {
            border: 2px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--shadow);
            background: var(--code-bg);
        }

        .CodeMirror {
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', 'Courier New', monospace !important;
            font-size: 14px !important;
            height: 300px !important;
            background: var(--code-bg) !important;
        }

        .CodeMirror-linenumber {
            color: #666 !important;
        }

        /* ===== STATUS MESSAGES ===== */
        .editor-status {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 8px;
            margin-top: 12px;
            font-size: 13px;
            font-weight: 600;
            display: none;
        }

        .editor-status.show {
            display: flex;
        }

        .editor-status.warning {
            background: linear-gradient(135deg, #fff3e0 0%, #ffe0b2 100%);
            color: var(--warning);
            border-left: 4px solid var(--warning);
        }

        .editor-status.error {
            background: linear-gradient(135deg, var(--error-light) 0%, #ffcdd2 100%);
            color: var(--error);
            border-left: 4px solid var(--error);
        }

        .editor-status.success {
            background: linear-gradient(135deg, var(--success-light) 0%, #c8e6c9 100%);
            color: var(--success);
            border-left: 4px solid var(--success);
        }

        /* ===== SOLUTION BOX ===== */
        .solution-box {
            display: none;
            background: linear-gradient(135deg, var(--success-light) 0%, #f1f8e9 100%);
            padding: 24px;
            border-radius: 12px;
            border-left: 5px solid var(--success);
            box-shadow: var(--shadow);
            margin-top: 24px;
        }

        .solution-box.show {
            display: block;
            animation: slideDown 0.4s ease;
        }

        .solution-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--success);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
        }

        .solution-code {
            background: var(--code-bg);
            padding: 16px;
            border-radius: 8px;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', 'Courier New', monospace;
            font-size: 13px;
            color: #abb2bf;
            line-height: 1.6;
            overflow-x: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        /* ===== IDE BUTTONS ===== */
        .ide-section {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .ide-btn {
            flex: 1;
            padding: 12px 16px;
            border-radius: 8px;
            border: 2px solid var(--border);
            background: var(--bg-light);
            color: var(--text-main);
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
        }

        .ide-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: var(--primary-light);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(26, 115, 232, 0.2);
        }

        /* ===== CONTROLS ===== */
        .controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
            flex-wrap: wrap;
        }

        button {
            padding: 12px 28px;
            border-radius: 8px;
            border: 2px solid var(--border);
            background: var(--bg-light);
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            min-height: 44px;
            color: var(--text-main);
        }

        button:hover:not(:disabled) {
            border-color: var(--primary);
            color: var(--primary);
            background: var(--primary-light);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(26, 115, 232, 0.2);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            box-shadow: 0 4px 12px rgba(26, 115, 232, 0.3);
            font-weight: 700;
        }

        .btn-primary:hover {
            box-shadow: 0 6px 16px rgba(26, 115, 232, 0.4);
            transform: translateY(-2px);
        }

        .btn-success {
            background: linear-gradient(135deg, var(--success) 0%, #2e7d32 100%);
            color: white;
            border: none;
            box-shadow: 0 4px 12px rgba(30, 142, 62, 0.3);
            font-weight: 700;
        }

        .btn-success:hover {
            box-shadow: 0 6px 16px rgba(30, 142, 62, 0.4);
            transform: translateY(-2px);
        }

        #next-btn {
            display: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 1024px) {
            .sidebar { width: 260px; }
            .main-content { margin-left: 260px; padding: 30px; }
            .header h1 { font-size: 28px; }
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: static;
                border-right: none;
                border-bottom: 1px solid var(--border);
            }
            .sidebar-content { flex-direction: row; gap: 20px; }
            .main-content { margin-left: 0; padding: 20px; max-width: 100%; }
            .header h1 { font-size: 24px; }
            .assignment-card { padding: 20px; }
            .controls { flex-direction: column; }
            button { width: 100%; justify-content: center; }
            .ide-section { flex-direction: column; }
            .CodeMirror { height: 250px !important; }
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-light); }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">
        <div class="sidebar-logo">
            <img src="jade_logo.webp" alt="Jade Global Logo" class="logo-img">
        </div>
    </div>

    <div class="sidebar-content">
        <div class="progress-section">
            <div class="progress-label">💻 Task Progress</div>
            <div class="progress-value" id="progress-text">1 / 10</div>
            <div class="progress-bar-small">
                <div class="progress-fill-small" id="progress-fill" style="width: 10%"></div>
            </div>
        </div>

        <nav class="sidebar-nav" style="margin-top: auto;">
            <a href="../index.html">← Exit Assignment</a>
        </nav>
    </div>
</div>

<div class="main-content">
    <div class="header">
        <div class="badge">Architecture & Engineering</div>
        <h1>Advanced LLM Practical</h1>
        <p>Implement the core logic for production-grade AI systems.</p>
    </div>

    <div id="assignment-container"></div>

    <div class="controls">
        <button id="prev-btn" onclick="move(-1)" disabled>← Previous</button>
        <button id="submit-code-btn" class="btn-success" onclick="submitCode()">Submit Solution →</button>
        <button id="next-btn" class="btn-primary" onclick="move(1)">Next Engineering Task →</button>
    </div>
</div>

<script>
    // GATEKEEPER
    window.onload = function() {
        const postDone = localStorage.getItem('adv_post_completed');
        if (!postDone) {
            alert("Access Denied: Please complete the Advanced Post-Assessment (Final Quiz) first.");
            window.location.href = "adv_post_assessment.html";
            return;
        }
        buildTasks();
        initializeEditors();
    };

    const tasks = [
        {
            topic: "Autonomous Agent Architecture",
            instruction: `
                <strong>Requirement:</strong> A hedge fund wants to automate 'Stock Alerts'. The system must fetch real-time data and email the CFO.<br>
                <strong>Technical Task:</strong> Implement the <strong>Think-Act-Observe</strong> loop logic. Your code must decide when to call a 'Market API' and when to call an 'Email Tool'.<br>
                <strong>Key Requirements:</strong> 
                <ul>
                    <li>Define the loop cycle.</li>
                    <li>Identify the specific tool for $900+ price retrieval.</li>
                </ul>`,
            solution: "Logical Engineering Flow:\n1. Think: User needs NVDA price. I need external data.\n2. Act: Call stock_api_tool(ticker='NVDA').\n3. Observe: API returns '$905.50'.\n4. Think: I have the data; now I must format the email summary.\n5. Act: Call email_send_tool(to='cfo@global.com', body='NVDA Alert: $905.50').\n6. Observe: Receive 'Success' status from SMTP server."
        },
        {
            topic: "Stateful Workflows with LangGraph",
            instruction: `
                <strong>Requirement:</strong> An HR system needs to process 'Leave Requests' but requires a human-in-the-loop for requests over 3 days.<br>
                <strong>Technical Task:</strong> Design a stateful graph. Define the <strong>Nodes</strong> and the specific LangGraph function used to pause execution for a manager.<br>
                <strong>Key Requirements:</strong> 
                <ul>
                    <li>Define conditional branching logic.</li>
                    <li>Implement the human-approval 'interrupt'.</li>
                </ul>`,
            solution: "Architecture Components:\n- Node 1: check_eligibility (updates shared 'State').\n- Conditional Edge: \n    if leave_days > 3 -> route to 'manager_approval' node.\n    else -> route to 'auto_approve' node.\n- Node 2 (Critical): manager_approval. Use the <strong>interrupt()</strong> feature to pause the graph and wait for human input via the state dictionary."
        },
        {
            topic: "Multi-Agent Coordination (Supervisor)",
            instruction: `
                <strong>Requirement:</strong> A consulting firm needs to generate 50-page competitor reports in minutes instead of days.<br>
                <strong>Technical Task:</strong> Design a <strong>Supervisor + Workers</strong> architecture. Describe how the Supervisor prevents 'context overflow' by delegating to specialists.<br>
                <strong>Key Requirements:</strong> 
                <ul>
                    <li>Name 3 specialized worker roles.</li>
                    <li>Define the Supervisor's role in the final assembly.</li>
                </ul>`,
            solution: "System Design:\n- Supervisor Role: Acts as the orchestrator; reads the goal and partitions it into sub-tasks.\n- Worker 1: Web Scraper (finds competitor news).\n- Worker 2: Financial Analyst (pulls revenue APIs).\n- Worker 3: Quality Agent (fact-checks to prevent hallucination).\n- Assembly: Supervisor merges individual worker outputs into one report."
        },
        {
            topic: "Performance: Semantic Caching",
            instruction: `
                <strong>Requirement:</strong> Your chatbot costs $500/day. 40% of questions are similar (e.g., 'What are your hours?' and 'When do you open?').<br>
                <strong>Technical Task:</strong> Write a Python function for a <strong>Semantic Cache</strong> using a Vector DB to return responses without calling the LLM API.<br>
                <strong>Key Requirements:</strong> 
                <ul>
                    <li>Check for 'meaning' similarity, not exact text.</li>
                    <li>Provide logic to save new answers to the cache.</li>
                </ul>`,
            solution: "Cost Optimization Code:\ncache = {} # Conceptually a Vector DB\ndef ask_bot(query):\n    # 1. Search cache for 'Semantic Similarity'\n    if is_similar(query, cache):\n        return cache[query] # 0ms response, $0 cost\n    \n    # 2. If Miss: Call LLM API\n    res = client.chat.completions.create(model='gpt-4o-mini', messages=[...])\n    # 3. Store for next time\n    cache[query] = res.choices[0].message.content\n    return cache[query]"
        },
        {
            topic: "Security: Output Guardrails",
            instruction: `
                <strong>Requirement:</strong> A chatbot must never promise a 'Refund' or 'Discount' that isn't in the official company policy.<br>
                <strong>Technical Task:</strong> Implement an <strong>Output Guardrail</strong> wrapper. Your code must intercept the LLM response before the user sees it.<br>
                <strong>Key Requirements:</strong> 
                <ul>
                    <li>Define a list of restricted keywords.</li>
                    <li>Add a fallback refusal message if the model goes off-policy.</li>
                </ul>`,
            solution: "Security Wrapper:\ndef secure_output_wrapper(llm_response):\n    restricted = ['refund', 'discount', 'free']\n    # Output Guardrail: checks before user sees it\n    if any(word in llm_response.lower() for word in restricted):\n        # Logic: Cross-check against RAG grounded policy\n        if not is_valid_policy(llm_response):\n            return \"I cannot confirm that. Please wait for an agent.\"\n    return llm_response"
        },
        {
            topic: "RAG Evaluation (RAGAs)",
            instruction: `
                <strong>Requirement:</strong> Your RAG bot has a low 'Faithfulness' score of 0.58. Users are complaining about 'confidently wrong' answers.<br>
                <strong>Technical Task:</strong> Use the <strong>RAGAs Framework</strong> logic to diagnose the system. Explain what 0.58 means technically.<br>
                <strong>Key Requirements:</strong> 
                <ul>
                    <li>Define the Faithfulness metric.</li>
                    <li>Identify the 'Engineering Fix' (Prompting vs. Retrieval).</li>
                </ul>`,
            solution: "Evaluation Diagnostic:\n- Meaning: A score of 0.58 indicates the LLM is hallucinating facts nearly 40% of the time.\n- Technical Fix 1: Improve 'System Prompt' to enforce grounding in retrieved context.\n- Technical Fix 2: Check 'Context Recall' to ensure retrieved documents actually contain the answer."
        },
        {
            topic: "Cost Optimization: Model Routing",
            instruction: `
                <strong>Requirement:</strong> An app processes 1 million queries daily. You need to cut the $30,000/day bill by 70%.<br>
                <strong>Technical Task:</strong> Build a <strong>Model Router</strong> that implements 'Tiered Selection' based on task complexity.<br>
                <strong>Key Requirements:</strong> 
                <ul>
                    <li>Route simple spam/FAQ to a Tier 1 model.</li>
                    <li>Route complex audits to a Tier 3 model.</li>
                </ul>`,
            solution: "Routing Architecture:\ndef model_router(query):\n    if is_simple_task(query):\n        # Route to Tier 1: Small/Fast (GPT-4o-mini/Haiku)\n        return call_llm(model='gpt-4o-mini', cost='$0.001/1K')\n    else:\n        # Route to Tier 3: Large/Reasoning (GPT-4 Turbo/Opus)\n        return call_llm(model='gpt-4-turbo', cost='$0.05/1K')\n# Saves ~70-80% cost."
        },
        {
            topic: "Observability (LangSmith)",
            instruction: `
                <strong>Requirement:</strong> An agent is stuck in an infinite loop, repeating the same tool call. The logs are empty.<br>
                <strong>Technical Task:</strong> Describe the <strong>Observability</strong> process using LangSmith to break the loop without a code redeploy.<br>
                <strong>Key Requirements:</strong> 
                <ul>
                    <li>Explain 'Tracing'.</li>
                    <li>Use the 'Playground' fix method.</li>
                </ul>`,
            solution: "Observability Process:\n1. Open the failed trace in LangSmith to see the tree of tool calls.\n2. Identify the specific Node outputting incorrect state.\n3. Click 'Open in Playground' to pull the exact failed prompt.\n4. Tweak system instructions in the playground to fix the loop logic and re-run instantly."
        },
        {
            topic: "Hybrid Deployment Architecture",
            instruction: `
                <strong>Requirement:</strong> A hospital must summarize patient data but PHI (Protected Health Information) cannot leave their servers.<br>
                <strong>Technical Task:</strong> Decide between <strong>Serverless API</strong> vs. <strong>Self-Hosted OSS</strong>. Provide the technical reasoning.<br>
                <strong>Key Requirements:</strong> 
                <ul>
                    <li>Assess privacy vs. intelligence.</li>
                    <li>Name a specific self-hosting tool (e.g., Ollama/vLLM).</li>
                </ul>`,
            solution: "Architecture Decision:\n- Decision: Hospital must use <strong>Self-Hosted OSS Model</strong>.\n- Reasoning: Serverless APIs send data to external vendors. OSS (Llama 3) on local GPUs ensures data stays private.\n- Tools: Deploy via <strong>Ollama or vLLM</strong> on private infrastructure."
        },
        {
            topic: "Latency: Streaming Implementation",
            instruction: `
                <strong>Requirement:</strong> Users are abandoning your chatbot because it takes 5 seconds to load the first word.<br>
                <strong>Technical Task:</strong> Implement <strong>Streaming</strong>. Explain the impact on 'Time to First Token' (TTFT).<br>
                <strong>Key Requirements:</strong> 
                <ul>
                    <li>Provide the specific API parameter for streaming.</li>
                    <li>Explain the difference in TTFT.</li>
                </ul>`,
            solution: "Latency Engineering:\n- Impact: TTFT drops from 4 seconds to ~180ms.\n- Code Parameter: In the completions API call, set <strong>stream=True</strong>.\n- Logic: Use a 'for chunk in stream' loop to print/send tokens to the UI as they generate."
        }
    ];

    let current = 0;
    let editors = {};

    function buildTasks() {
        const container = document.getElementById('assignment-container');
        tasks.forEach((t, i) => {
            const div = document.createElement('div');
            div.className = `assignment-card ${i === 0 ? 'active' : ''}`;
            div.id = `task-${i}`;
            div.innerHTML = `
                <div class="task-topic">📌 ${t.topic}</div>
                
                <div class="instruction">
                    ${t.instruction}
                </div>

                <div class="editor-section">
                    <label class="editor-label">✏️ Code & Logic Editor</label>
                    <div class="editor-info">Max 15 lines • Syntax highlighting • Auto-formatted</div>
                    <div class="editor-wrapper">
                        <textarea id="editor-${i}" class="code-input"></textarea>
                    </div>
                    <div class="editor-status" id="status-${i}"></div>
                </div>

                <div class="ide-section">
                    <a href="https://replit.com/new/python" target="_blank" class="ide-btn">
                        🌐 Try on Replit
                    </a>
                    <a href="https://www.online-python.com/" target="_blank" class="ide-btn">
                        💻 Online IDE
                    </a>
                </div>

                <div class="solution-box" id="sol-${i}">
                    <div class="solution-title">✓ Reference Solution & Architecture</div>
                    <div class="solution-code">${t.solution}</div>
                </div>
            `;
            container.appendChild(div);
        });
    }

    function initializeEditors() {
        tasks.forEach((t, i) => {
            editors[i] = CodeMirror.fromTextArea(document.getElementById(`editor-${i}`), {
                mode: 'python', // Python mode handles pseudocode and text reasonably well
                theme: 'dracula',
                lineNumbers: true,
                indentUnit: 4,
                indentWithTabs: false,
                lineWrapping: true,
                smartIndent: true,
                matchBrackets: true,
                autoCloseBrackets: true,
                styleActiveLine: true,
                highlightSelectionMatches: {showToken: /\w/, annotateScrollbar: true}
            });

            // Limit paste to 15 lines for Advanced
            editors[i].on('paste', (instance, event) => {
                const clipboardData = event.clipboardData || window.clipboardData;
                const pastedText = clipboardData.getData('Text');
                const lines = pastedText.split('\n').filter(l => l.trim());
                
                if (lines.length > 15) {
                    event.preventDefault();
                    showStatus(i, 'error', '❌ Max 15 lines allowed! Paste reduced.');
                    const truncated = lines.slice(0, 15).join('\n');
                    instance.replaceSelection(truncated);
                } else {
                    showStatus(i, 'success', '✓ Paste successful');
                }
            });

            // Monitor line count
            editors[i].on('change', (instance) => {
                const lines = instance.lineCount();
                if (lines > 15) {
                    showStatus(i, 'warning', `⚠️ ${lines} lines (max 15). Consider condensing.`);
                } else if (lines > 0) {
                    showStatus(i, 'success', `✓ ${lines} line${lines > 1 ? 's' : ''} entered`);
                } else {
                    clearStatus(i);
                }
            });
        });
    }

    function showStatus(i, type, message) {
        const status = document.getElementById(`status-${i}`);
        status.className = `editor-status show ${type}`;
        status.textContent = message;
    }

    function clearStatus(i) {
        const status = document.getElementById(`status-${i}`);
        status.classList.remove('show');
    }

    function submitCode() {
        const code = editors[current].getValue();
        const lines = code.split('\n').filter(l => l.trim()).length;

        if (lines === 0) {
            showStatus(current, 'error', '❌ Please enter your logic or code first');
            return;
        }

        if (lines > 15) {
            showStatus(current, 'error', `❌ Submission exceeds 15 lines (${lines} lines)`);
            return;
        }

        // Show solution
        document.getElementById(`sol-${current}`).classList.add('show');
        document.getElementById('submit-code-btn').style.display = 'none';
        document.getElementById('next-btn').style.display = 'flex';

        // Update button text if last task
        if (current === tasks.length - 1) {
            const nextBtn = document.getElementById('next-btn');
            nextBtn.textContent = "✓ Finish LLM Mastery Journey";
            nextBtn.classList.remove('btn-primary');
            nextBtn.classList.add('btn-success');
            
            nextBtn.onclick = () => {
                // 1. Set the final completion flag for the Advanced Level
                localStorage.setItem('adv_assign_completed', 'true');
                
                // 2. SCORM Reporting for LMS tracking
                if(typeof pipwerks !== "undefined"){
                    pipwerks.SCORM.set("cmi.core.lesson_status", "completed");
                    pipwerks.SCORM.set("cmi.core.score.raw", "100");
                    pipwerks.SCORM.save();
                }
                
                alert("Congratulations! You have completed the Advanced Engineering Practical and finished the course.");
                
                // 3. Return to Dashboard
                window.location.href = '../index.html';
            };
        }

        showStatus(current, 'success', '✓ Great! Review the reference architecture below.');
    }

    function move(dir) {
        // Hide current task
        document.getElementById(`task-${current}`).classList.remove('active');
        clearStatus(current);
        
        // Update index
        current = Math.max(0, Math.min(tasks.length - 1, current + dir));
        
        // Show new task
        document.getElementById(`task-${current}`).classList.add('active');
        
        // UI Updates
        const progress = Math.round(((current + 1) / tasks.length) * 100);
        document.getElementById('progress-text').textContent = `${current + 1} / ${tasks.length}`;
        document.getElementById('progress-fill').style.width = progress + '%';
        document.getElementById('prev-btn').disabled = (current === 0);
        
        // Reset buttons
        document.getElementById('submit-code-btn').style.display = 'flex';
        document.getElementById('next-btn').style.display = 'none';

        // Refresh editor
        setTimeout(() => editors[current].refresh(), 100);
    }
</script>

</body>
</html>
