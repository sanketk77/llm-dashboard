<!DOCTYPE html>
<html lang="en">
<head>
    <script src="scormdriver.js"></script>
    <script src="APIWrapper.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Intermediate — Post-Assessment</title>
    <style>
        :root {
            --primary: #1a73e8;
            --primary-light: #e8f0fe;
            --primary-dark: #1557b0;
            --success: #1e8e3e;
            --success-light: #f1f8e9;
            --error: #d32f2f;
            --error-light: #ffebee;
            --bg: #f8f9fa;
            --bg-light: #ffffff;
            --text-main: #202124;
            --text-sub: #5f6368;
            --text-light: #80868b;
            --border: #dadce0;
            --shadow: 0 2px 8px rgba(0,0,0,0.1);
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }

        html, body {
            height: 100%;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #f8f9fa 0%, #f0f4f8 100%);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 280px;
            background: var(--bg-light);
            border-right: 1px solid var(--border);
            padding: 0;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 24px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(135deg, #f8f9fa 0%, #ffffff 100%);
        }

        .sidebar-logo {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .logo-img {
            width: 160px;
            height: auto;
            display: block;
            filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.1));
            transition: transform 0.3s ease;
        }

        .logo-img:hover {
            transform: scale(1.05);
        }

        .sidebar-content {
            padding: 30px 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .timer-section {
            background: linear-gradient(135deg, var(--primary-light) 0%, #f0f7ff 100%);
            padding: 20px;
            border-radius: 12px;
            border-left: 4px solid var(--primary);
        }

        .timer-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .timer-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
            font-variant-numeric: tabular-nums;
            transition: color 0.3s ease;
        }

        .timer-value.warning {
            color: #f57c00;
        }

        .timer-value.critical {
            color: var(--error);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .answered-section {
            background: linear-gradient(135deg, var(--success-light) 0%, #f1f8e9 100%);
            padding: 20px;
            border-radius: 12px;
            border-left: 4px solid var(--success);
        }

        .answered-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .answered-count {
            font-size: 24px;
            font-weight: 700;
            color: var(--success);
        }

        .sidebar-nav {
            margin-top: auto;
        }

        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            text-decoration: none;
            color: var(--text-main);
            border-radius: 8px;
            transition: all 0.3s ease;
            font-size: 14px;
            font-weight: 500;
        }

        .sidebar-nav a:hover {
            background: var(--primary-light);
            color: var(--primary);
            transform: translateX(-4px);
        }

        /* ===== MAIN CONTENT ===== */
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 40px;
            overflow-y: auto;
            max-width: 900px;
        }

        .header {
            margin-bottom: 40px;
            animation: fadeInDown 0.5s ease;
        }

        .badge {
            display: inline-block;
            font-size: 11px;
            font-weight: 700;
            padding: 6px 14px;
            border-radius: 20px;
            background: linear-gradient(135deg, var(--primary-light) 0%, #d2e3fc 100%);
            color: var(--primary);
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 2px 4px rgba(26, 115, 232, 0.1);
        }

        .header h1 {
            font-size: 36px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .header p {
            font-size: 16px;
            color: var(--text-sub);
            line-height: 1.6;
        }

        /* ===== PROGRESS BAR ===== */
        .progress-container {
            margin-bottom: 40px;
            position: sticky;
            top: 0;
            background: rgba(248, 249, 250, 0.95);
            padding: 20px 0;
            z-index: 10;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .progress-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-main);
        }

        .progress-percentage {
            font-size: 13px;
            font-weight: 700;
            color: var(--primary);
        }

        .progress-bar {
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary) 0%, var(--primary-dark) 100%);
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 4px;
            position: relative;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* ===== QUESTION CARD ===== */
        .qcard {
            background: var(--bg-light);
            border-radius: 16px;
            padding: 32px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            margin-bottom: 32px; /* Space between cards */
            animation: fadeIn 0.4s ease;
        }

        .qcard-header {
            margin-bottom: 32px;
        }

        .topic-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            display: block;
        }

        .qnum {
            font-size: 13px;
            color: var(--text-light);
            font-weight: 600;
            margin-bottom: 16px;
        }

        .qtext {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 0;
            line-height: 1.5;
            letter-spacing: -0.3px;
        }

        .qcard-content {
            flex: 1;
        }

        /* ===== OPTIONS ===== */
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 28px;
        }

        .opt {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 20px;
            border-radius: 12px;
            border: 2px solid var(--border);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: var(--bg-light);
            position: relative;
            overflow: hidden;
        }

        .opt::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.4s ease;
        }

        .opt:hover {
            border-color: var(--primary);
            background: var(--primary-light);
            transform: translateX(4px);
            box-shadow: 0 4px 12px rgba(26, 115, 232, 0.15);
        }

        .opt:hover::before {
            left: 100%;
        }

        .opt.selected {
            background: var(--primary-light);
            border-color: var(--primary);
            box-shadow: 0 4px 12px rgba(26, 115, 232, 0.2);
        }

        .olabel {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            color: var(--text-main);
            background: var(--bg);
            flex-shrink: 0;
            transition: all 0.3s ease;
        }

        .opt.selected .olabel {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 2px 8px rgba(26, 115, 232, 0.3);
        }

        .otext {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-main);
            line-height: 1.4;
        }

        /* ===== CONTROLS ===== */
        .nav-controls {
            display: flex;
            align-items: center;
            justify-content: center; /* Center the submit button */
            gap: 16px;
            margin-top: 40px;
            margin-bottom: 60px;
            padding-top: 32px;
            border-top: 1px solid var(--border);
        }

        button {
            padding: 16px 40px;
            border-radius: 8px;
            border: 2px solid var(--border);
            background: var(--bg-light);
            cursor: pointer;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-main);
        }

        button:hover:not(:disabled) {
            border-color: var(--primary);
            color: var(--primary);
            background: var(--primary-light);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(26, 115, 232, 0.2);
        }

        button:active:not(:disabled) {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-submit {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            box-shadow: 0 4px 12px rgba(26, 115, 232, 0.3);
            font-weight: 700;
            width: 100%;
            max-width: 400px;
            justify-content: center;
        }

        .btn-submit:hover:not(:disabled) {
            box-shadow: 0 6px 16px rgba(26, 115, 232, 0.4);
            transform: translateY(-2px);
            color: white;
        }

        .btn-outline {
            background: var(--bg-light);
            color: var(--primary);
            border: 2px solid var(--primary);
            box-shadow: none;
        }

        .btn-outline:hover {
            background: var(--primary-light);
            box-shadow: 0 4px 12px rgba(26, 115, 232, 0.15);
        }

        /* ===== RESULTS ===== */
        #results {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .results-header {
            text-align: center;
            padding: 40px;
            background: var(--bg-light);
            border-radius: 16px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            margin-bottom: 32px;
        }

        .results-header h2 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--text-main);
        }

        .score-big {
            font-size: 56px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 16px;
            letter-spacing: -1px;
        }

        .results-subtitle {
            font-size: 16px;
            color: var(--text-sub);
            line-height: 1.6;
        }

        .result-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin: 32px 0;
        }

        .stat-card {
            background: var(--bg-light);
            padding: 24px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin: 40px 0;
            flex-wrap: wrap;
        }

        .action-buttons .btn-submit {
            padding: 14px 32px;
            font-size: 15px;
        }

        .review-section {
            margin-top: 40px;
        }

        .review-section h3 {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 2px solid var(--border);
        }

        .review-card {
            background: var(--bg-light);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            border-left: 5px solid var(--border);
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
        }

        .review-card:hover {
            box-shadow: var(--shadow-lg);
            transform: translateX(4px);
        }

        .review-card.correct {
            border-left-color: var(--success);
            background: linear-gradient(135deg, var(--bg-light) 0%, var(--success-light) 100%);
        }

        .review-card.incorrect {
            border-left-color: var(--error);
            background: linear-gradient(135deg, var(--bg-light) 0%, var(--error-light) 100%);
        }

        .review-qtext {
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 12px;
            color: var(--text-main);
        }

        .review-item {
            font-size: 14px;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .review-item.correct {
            color: var(--success);
            font-weight: 600;
        }

        .review-item.incorrect {
            color: var(--error);
        }

        .exp-box {
            background: rgba(255,255,255,0.6);
            padding: 12px 16px;
            border-radius: 8px;
            margin-top: 12px;
            font-size: 13px;
            color: var(--text-sub);
            border-left: 3px solid var(--primary);
            line-height: 1.5;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 1024px) {
            .sidebar { width: 260px; }
            .main-content { margin-left: 260px; padding: 30px; }
            .header h1 { font-size: 28px; }
            .qcard { padding: 24px; }
        }

        @media (max-width: 768px) {
            .sidebar { width: 100%; height: auto; position: static; border-right: none; border-bottom: 1px solid var(--border); }
            .sidebar-content { flex-direction: row; gap: 20px; }
            .main-content { margin-left: 0; padding: 20px; max-width: 100%; }
            .header h1 { font-size: 24px; }
            .qcard { padding: 20px; }
            .result-grid { grid-template-columns: 1fr; }
            .action-buttons { flex-direction: column; }
            .btn-submit { max-width: 100%; }
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-light); }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">
        <div class="sidebar-logo">
            <img src="jade_logo.webp" alt="Jade Global Logo" class="logo-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
            <div style="display:none; font-weight: 800; color: var(--primary); font-size: 1.2rem; letter-spacing: -0.5px;">JADE GLOBAL</div>
        </div>
    </div>

    <div class="sidebar-content">
        <div class="timer-section">
            <div class="timer-label">⏱ Time Remaining</div>
            <div id="qtimer" class="timer-value">20:00</div>
        </div>

        <div class="answered-section">
            <div class="answered-label">✓ Answered</div>
            <div class="answered-count" id="ans-num">0 / 20</div>
        </div>

        <nav class="sidebar-nav" style="margin-top: auto;">
            <a href="index.html">← Exit Assessment</a>
        </nav>
    </div>
</div>

<div class="main-content">
    <div id="quiz-ui">
        <div class="header">
            <div class="badge">📝 Assessment</div>
            <h1>Intermediate Post-Assessment</h1>
            <p>Test your mastery of advanced LLM concepts. Answer based on what you've learned.</p>
        </div>

        <div class="progress-container">
            <div class="progress-info">
                <span class="progress-label">Progress</span>
                <span class="progress-percentage" id="prog-text">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="prog" style="width: 0%"></div>
            </div>
        </div>

        <div id="questions-container"></div>

        <div class="nav-controls">
            <button id="submit-btn" class="btn-submit" onclick="submitAssessment()" disabled>Complete All Questions to Submit</button>
        </div>
    </div>

    <div id="results"></div>
</div>

<script>
// 1. GATEKEEPER: Ensure Intermediate Content was reviewed first
// (Commented out for local testing. Uncomment in production.)
window.onload = function() {
    /*
    const contentDone = localStorage.getItem('int_content_completed');
    if (!contentDone) {
        alert("Please complete the Intermediate Learning Materials before taking the Post-Assessment.");
        window.location.href = "int_content.html";
        return;
    }
    */
    buildQuestions();
    startTimer();
};

const QS = [
    {
        topic:"Prompt Engineering", tc:"t-prompt",
        q:"You want an LLM to generate a concise business summary for executives. Which prompt is best?",
        opts:[
            "Summarize this article",
            "Summarize this article in 3 bullet points for a non-technical executive, focusing on business impact",
            "Explain everything in detail",
            "Write anything useful"
        ],
        ans:1,
        exp:"A strong prompt includes audience, format, and focus area, leading to more useful outputs."
    },
    {
        topic:"Prompt Engineering", tc:"t-prompt",
        q:"You want the model to solve a complex reasoning problem accurately. Which technique should you use?",
        opts:["Zero-shot prompting","Chain-of-thought prompting","High temperature","Short prompts"],
        ans:1,
        exp:"Chain-of-thought improves reasoning by guiding the model through step-by-step thinking."
    },
    {
        topic:"Prompt Engineering", tc:"t-prompt",
        q:"A prompt gives conflicting instructions like 'be concise but also very detailed'. What is the issue?",
        opts:["Too specific","Conflicting instructions","Low temperature","Wrong API"],
        ans:1,
        exp:"Conflicting instructions confuse the model and reduce output quality."
    },
    {
        topic:"LLM APIs", tc:"t-api",
        q:"You want consistent, factual responses from an LLM API. Which setting is most appropriate?",
        opts:["High temperature (1.2)","Low temperature (0.0)","High max_tokens","Enable streaming"],
        ans:1,
        exp:"Low temperature reduces randomness and ensures deterministic outputs."
    },
    {
        topic:"LLM APIs", tc:"t-api",
        q:"Your application hits API rate limits frequently. What is the best solution?",
        opts:["Increase temperature","Use exponential backoff retries","Reduce prompt clarity","Remove system prompt"],
        ans:1,
        exp:"Exponential backoff helps handle rate limits by retrying requests after delays."
    },
    {
        topic:"LLM APIs", tc:"t-api",
        q:"What is the role of a system message in an LLM API call?",
        opts:[
            "It stores embeddings",
            "It defines the model's behavior and role",
            "It controls API billing",
            "It limits token size"
        ],
        ans:1,
        exp:"System messages define the assistant's persona and behavior across the conversation."
    },
    {
        topic:"LangChain", tc:"t-lang",
        q:"You want to connect multiple steps like prompt → LLM → output parser. What is this called?",
        opts:["Agent loop","Chain","Embedding pipeline","Vector search"],
        ans:1,
        exp:"Chains in LangChain allow sequential execution of multiple components."
    },
    {
        topic:"LangChain", tc:"t-lang",
        q:"Which LangChain component helps retain conversation history efficiently in long chats?",
        opts:[
            "ConversationBufferMemory",
            "ConversationSummaryMemory",
            "PromptTemplate",
            "OutputParser"
        ],
        ans:1,
        exp:"Summary memory compresses past conversations, saving tokens while maintaining context."
    },
    {
        topic:"LangChain", tc:"t-lang",
        q:"You want an LLM to decide whether to call a search API or run code dynamically. What should you use?",
        opts:["Chains","Agents","Embeddings","Tokenization"],
        ans:1,
        exp:"Agents allow LLMs to decide which tools to use and in what order."
    },
    {
        topic:"Embeddings", tc:"t-embed",
        q:"Why are embeddings useful in LLM applications?",
        opts:[
            "They reduce token size",
            "They convert text into vectors capturing meaning",
            "They improve UI design",
            "They replace prompts"
        ],
        ans:1,
        exp:"Embeddings represent semantic meaning numerically, enabling similarity-based tasks."
    },
    {
        topic:"Embeddings", tc:"t-embed",
        q:"Two sentences have very similar meanings. What will be true about their embeddings?",
        opts:[
            "They will have identical tokens",
            "They will be far apart in vector space",
            "They will be close in vector space",
            "They will have fewer dimensions"
        ],
        ans:2,
        exp:"Semantically similar text results in vectors that are close together."
    },
    {
        topic:"Vector Databases", tc:"t-vdb",
        q:"Why not use a traditional database for semantic search?",
        opts:[
            "They are too fast",
            "They only support numbers",
            "They rely on keyword matching, not meaning",
            "They cannot store data"
        ],
        ans:2,
        exp:"Traditional databases cannot understand semantic similarity, only keywords."
    },
    {
        topic:"Vector Databases", tc:"t-vdb",
        q:"You need fast search over millions of embeddings. Which approach is best?",
        opts:["Flat search","Manual filtering","ANN indexing (like HNSW)","Sorting alphabetically"],
        ans:2,
        exp:"Approximate Nearest Neighbor (ANN) methods enable fast similarity search at scale."
    },
    {
        topic:"Vector Databases", tc:"t-vdb",
        q:"You want to filter results by 'year > 2023' along with semantic similarity. What is this called?",
        opts:["Tokenization","Hybrid search","Chunking","Streaming"],
        ans:1,
        exp:"Hybrid search combines vector similarity with structured metadata filtering."
    },
    {
        topic:"RAG", tc:"t-rag",
        q:"What problem does Retrieval-Augmented Generation (RAG) solve?",
        opts:[
            "Slow training",
            "Lack of internet connection",
            "LLMs not knowing private or recent data",
            "Token limits only"
        ],
        ans:2,
        exp:"RAG allows LLMs to access external, up-to-date, or private data."
    },
    {
        topic:"RAG", tc:"t-rag",
        q:"In a RAG pipeline, what happens immediately after embedding the query?",
        opts:[
            "Generate final answer",
            "Search vector database",
            "Fine-tune model",
            "Train embeddings"
        ],
        ans:1,
        exp:"After embedding, the system searches for similar documents in the vector database."
    },
    {
        topic:"RAG", tc:"t-rag",
        q:"Why is chunking important in RAG systems?",
        opts:[
            "It reduces API cost only",
            "It splits documents into manageable pieces for better retrieval",
            "It increases temperature",
            "It removes embeddings"
        ],
        ans:1,
        exp:"Chunking ensures relevant parts of documents are retrieved instead of entire large texts."
    },
    {
        topic:"RAG", tc:"t-rag",
        q:"You notice retrieved results are repetitive and similar. What should you use?",
        opts:["Top-K search","MMR (diversity-based retrieval)","Lower temperature","Stop tokens"],
        ans:1,
        exp:"MMR balances relevance and diversity, reducing redundant results."
    },
    {
        topic:"RAG", tc:"t-rag",
        q:"Your RAG system gives answers not grounded in retrieved context. What is the best fix?",
        opts:[
            "Increase temperature",
            "Add instruction to answer only from context",
            "Remove embeddings",
            "Use fewer tokens"
        ],
        ans:1,
        exp:"A strong system prompt ensures the model relies only on provided context."
    },
    {
        topic:"End-to-End Systems", tc:"t-system",
        q:"Which sequence correctly represents a typical RAG workflow?",
        opts:[
            "Query → Train model → Answer",
            "Query → Embed → Retrieve → Add context → LLM answer",
            "Query → Tokenize → Store → Answer",
            "Query → Decode → Encode → Answer"
        ],
        ans:1,
        exp:"RAG works by embedding queries, retrieving relevant data, and generating answers using context."
    }
];

let answered = {};
let submitted = false;
let timeLeft = 20 * 60;
let timerInt;

function buildQuestions() {
    const c = document.getElementById('questions-container');
    document.getElementById('ans-num').textContent = `0 / ${QS.length}`; // Initialize counter

    QS.forEach((q, i) => {
        const d = document.createElement('div');
        // Render all blocks linearly without standard 'active' toggling
        d.className = 'qcard';
        d.id = 'q' + i;
        d.innerHTML = `
            <div class="qcard-header">
                <div class="topic-label">📌 ${q.topic}</div>
                <div class="qnum">Question ${i+1} of ${QS.length}</div>
                <div class="qtext">${q.q}</div>
            </div>
            <div class="qcard-content">
                <div class="options" id="opts${i}">
                    ${q.opts.map((o, j) => `
                        <div class="opt" id="opt${i}_${j}" onclick="selectOpt(${i},${j})">
                            <div class="olabel">${String.fromCharCode(65+j)}</div>
                            <div class="otext">${o}</div>
                        </div>`).join('')}
                </div>
            </div>`;
        c.appendChild(d);
    });
}

function selectOpt(qi, oi) {
    if (submitted) return;
    answered[qi] = oi;
    document.querySelectorAll(`#opts${qi} .opt`).forEach((el, j) => el.classList.toggle('selected', j === oi));
    
    const answeredCount = Object.keys(answered).length;
    document.getElementById('ans-num').textContent = `${answeredCount} / ${QS.length}`;
    
    const progPct = Math.round((answeredCount / QS.length) * 100);
    document.getElementById('prog').style.width = progPct + '%';
    document.getElementById('prog-text').textContent = progPct + '%';
    
    // Enable the single Submit button when all questions are answered
    if (answeredCount === QS.length) {
        const submitBtn = document.getElementById('submit-btn');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Submit Assessment →';
    }
}

function submitAssessment() {
    if(submitted) return;
    
    // Optional failsafe check
    if (Object.keys(answered).length < QS.length) {
        alert("Please answer all questions before submitting.");
        return;
    }

    submitted = true;
    clearInterval(timerInt);
    
    // UNLOCK: Mark intermediate post-assessment as complete
    localStorage.setItem('int_post_completed', 'true');
    showResults();
    window.scrollTo({ top: 0, behavior: 'smooth' }); // Scroll to top for results
}

function showResults() {
    document.getElementById('quiz-ui').style.display = 'none';
    const r = document.getElementById('results');
    r.style.display = 'block';
    
    let correct = 0;
    QS.forEach((q, i) => { if (answered[i] === q.ans) correct++; });
    const pct = Math.round((correct / QS.length) * 100);

    const timeSpentSec = (20 * 60) - timeLeft;
    const m = Math.floor(timeSpentSec / 60), s = timeSpentSec % 60;
    const timeStr = `${m}:${s < 10 ? '0' : ''}${s}`;

    r.innerHTML = `
        <div class="results-header">
            <h2>🎉 Post-Assessment Complete</h2>
            <div class="score-big">${pct}%</div>
            <p class="results-subtitle">Excellent work! The Intermediate Coding Assignment is now unlocked.</p>
        </div>

        <div class="result-grid">
            <div class="stat-card">
                <div class="stat-value">${correct}</div>
                <div class="stat-label">Correct</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" style="color:var(--error)">${QS.length - correct}</div>
                <div class="stat-label">Incorrect</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">${timeStr}</div>
                <div class="stat-label">Time Taken</div>
            </div>
        </div>

        <div class="action-buttons">
            <button class="btn-submit btn-outline" onclick="window.location.href='../index.html'">← Return to Dashboard</button>
            <button class="btn-submit" onclick="window.location.href='int_assignment.html'">💻 Proceed to Coding Assignment →</button>
        </div>

        <div class="review-section">
            <h3>📋 Review Your Answers</h3>
            ${QS.map((q, i) => {
                const ua = answered[i];
                const ok = ua === q.ans;
                return `
                <div class="review-card ${ok ? 'correct' : 'incorrect'}">
                    <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 12px;">
                        <span style="font-size: 18px;">${ok ? '✓' : '✗'}</span>
                        <div class="review-qtext">Question ${i + 1}</div>
                    </div>
                    <div style="font-weight: 600; margin-bottom: 12px; color: var(--text-main);">${q.q}</div>
                    <div class="review-item">Your Answer: <strong>${ua !== undefined ? q.opts[ua] : 'Not answered'}</strong></div>
                    ${!ok ? `<div class="review-item correct">✓ Correct: ${q.opts[q.ans]}</div>` : ''}
                    <div class="exp-box">💡 ${q.exp}</div>
                </div>`;
            }).join('')}
        </div>
    `;
}

function startTimer() {
    timerInt = setInterval(() => {
        timeLeft--;
        const m = Math.floor(timeLeft / 60), s = timeLeft % 60;
        const timerDisplay = document.getElementById('qtimer');
        timerDisplay.textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
        
        if (timeLeft <= 60) {
            timerDisplay.classList.add('warning');
        }
        if (timeLeft <= 30) {
            timerDisplay.classList.remove('warning');
            timerDisplay.classList.add('critical');
        }
        
        if (timeLeft <= 0) {
            clearInterval(timerInt);
            alert("⏱ Time is up! Submitting your answers...");
            // Force submit even if incomplete
            const answeredCount = Object.keys(answered).length;
            if(answeredCount < QS.length) {
                // mock filling answers so submission processes gracefully
                for(let i=0; i<QS.length; i++) {
                   if(answered[i] === undefined) answered[i] = -1; 
                }
            }
            submitAssessment();
        }
    }, 1000);
}
</script>
