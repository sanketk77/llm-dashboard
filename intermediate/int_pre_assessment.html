<!DOCTYPE html>
<html lang="en">
<head>
    <script src="scormdriver.js"></script>
    <script src="APIWrapper.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Intermediate — Pre-Assessment</title>
    <style>
        :root {
            --primary: #1a73e8;
            --primary-light: #e8f0fe;
            --primary-dark: #1557b0;
            --success: #1e8e3e;
            --success-light: #f1f8e9;
            --error: #d32f2f;
            --error-light: #ffebee;
            --bg: #f8f9fa;
            --bg-light: #ffffff;
            --text-main: #202124;
            --text-sub: #5f6368;
            --text-light: #80868b;
            --border: #dadce0;
            --shadow: 0 2px 8px rgba(0,0,0,0.1);
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }

        html, body {
            height: 100%;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #f8f9fa 0%, #f0f4f8 100%);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 280px;
            background: var(--bg-light);
            border-right: 1px solid var(--border);
            padding: 0;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 24px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(135deg, #f8f9fa 0%, #ffffff 100%);
        }

        .sidebar-logo {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .logo-img {
            width: 160px;
            height: auto;
            display: block;
            filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.1));
            transition: transform 0.3s ease;
        }

        .logo-img:hover {
            transform: scale(1.05);
        }

        .sidebar-content {
            padding: 30px 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .timer-section {
            background: linear-gradient(135deg, var(--primary-light) 0%, #f0f7ff 100%);
            padding: 20px;
            border-radius: 12px;
            border-left: 4px solid var(--primary);
        }

        .timer-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .timer-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
            font-variant-numeric: tabular-nums;
            transition: color 0.3s ease;
        }

        .timer-value.warning {
            color: #f57c00;
        }

        .timer-value.critical {
            color: var(--error);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .answered-section {
            background: linear-gradient(135deg, var(--success-light) 0%, #f1f8e9 100%);
            padding: 20px;
            border-radius: 12px;
            border-left: 4px solid var(--success);
        }

        .answered-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .answered-count {
            font-size: 24px;
            font-weight: 700;
            color: var(--success);
        }

        .sidebar-nav {
            margin-top: auto;
        }

        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            text-decoration: none;
            color: var(--text-main);
            border-radius: 8px;
            transition: all 0.3s ease;
            font-size: 14px;
            font-weight: 500;
        }

        .sidebar-nav a:hover {
            background: var(--primary-light);
            color: var(--primary);
            transform: translateX(-4px);
        }

        /* ===== MAIN CONTENT ===== */
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 40px;
            overflow-y: auto;
            max-width: 900px;
        }

        .header {
            margin-bottom: 40px;
            animation: fadeInDown 0.5s ease;
        }

        .badge {
            display: inline-block;
            font-size: 11px;
            font-weight: 700;
            padding: 6px 14px;
            border-radius: 20px;
            background: linear-gradient(135deg, var(--primary-light) 0%, #d2e3fc 100%);
            color: var(--primary);
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 2px 4px rgba(26, 115, 232, 0.1);
        }

        .header h1 {
            font-size: 36px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .header p {
            font-size: 16px;
            color: var(--text-sub);
            line-height: 1.6;
        }

        /* ===== PROGRESS BAR ===== */
        .progress-container {
            margin-bottom: 40px;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .progress-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-main);
        }

        .progress-percentage {
            font-size: 13px;
            font-weight: 700;
            color: var(--primary);
        }

        .progress-bar {
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary) 0%, var(--primary-dark) 100%);
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 4px;
            position: relative;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* ===== QUESTION CARD ===== */
        .qcard {
            background: var(--bg-light);
            border-radius: 16px;
            padding: 32px;
            box-shadow: var(--shadow);
            display: none;
            border: 1px solid var(--border);
            min-height: 500px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            animation: fadeIn 0.4s ease;
        }

        .qcard.active {
            display: flex;
        }

        .qcard-header {
            margin-bottom: 32px;
        }

        .topic-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            display: block;
        }

        .qnum {
            font-size: 13px;
            color: var(--text-light);
            font-weight: 600;
            margin-bottom: 16px;
        }

        .qtext {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 0;
            line-height: 1.5;
            letter-spacing: -0.3px;
        }

        .qcard-content {
            flex: 1;
        }

        /* ===== OPTIONS ===== */
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 28px;
        }

        .opt {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 20px;
            border-radius: 12px;
            border: 2px solid var(--border);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: var(--bg-light);
            position: relative;
            overflow: hidden;
        }

        .opt::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.4s ease;
        }

        .opt:hover {
            border-color: var(--primary);
            background: var(--primary-light);
            transform: translateX(4px);
            box-shadow: 0 4px 12px rgba(26, 115, 232, 0.15);
        }

        .opt:hover::before {
            left: 100%;
        }

        .opt.selected {
            background: var(--primary-light);
            border-color: var(--primary);
            box-shadow: 0 4px 12px rgba(26, 115, 232, 0.2);
        }

        .olabel {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            color: var(--text-main);
            background: var(--bg);
            flex-shrink: 0;
            transition: all 0.3s ease;
        }

        .opt.selected .olabel {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 2px 8px rgba(26, 115, 232, 0.3);
        }

        .otext {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-main);
            line-height: 1.4;
        }

        /* ===== CONTROLS ===== */
        .nav-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
        }

        button {
            padding: 12px 28px;
            border-radius: 8px;
            border: 2px solid var(--border);
            background: var(--bg-light);
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            min-height: 44px;
            color: var(--text-main);
        }

        button:hover:not(:disabled) {
            border-color: var(--primary);
            color: var(--primary);
            background: var(--primary-light);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(26, 115, 232, 0.2);
        }

        button:active:not(:disabled) {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-submit {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            box-shadow: 0 4px 12px rgba(26, 115, 232, 0.3);
            font-weight: 700;
        }

        .btn-submit:hover {
            box-shadow: 0 6px 16px rgba(26, 115, 232, 0.4);
            transform: translateY(-2px);
        }

        #submit-row {
            display: none;
        }

        /* ===== RESULTS ===== */
        #results {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .results-header {
            text-align: center;
            padding: 40px;
            background: var(--bg-light);
            border-radius: 16px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            margin-bottom: 32px;
        }

        .results-header h2 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--text-main);
        }

        .score-big {
            font-size: 56px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 16px;
            letter-spacing: -1px;
        }

        .results-subtitle {
            font-size: 16px;
            color: var(--text-sub);
            line-height: 1.6;
        }

        .result-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin: 32px 0;
        }

        .stat-card {
            background: var(--bg-light);
            padding: 24px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin: 40px 0;
            flex-wrap: wrap;
        }

        .action-buttons .btn-submit {
            padding: 14px 32px;
            font-size: 15px;
        }

        .review-section {
            margin-top: 40px;
        }

        .review-section h3 {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 2px solid var(--border);
        }

        .review-card {
            background: var(--bg-light);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            border-left: 5px solid var(--border);
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
        }

        .review-card:hover {
            box-shadow: var(--shadow-lg);
            transform: translateX(4px);
        }

        .review-card.correct {
            border-left-color: var(--success);
            background: linear-gradient(135deg, var(--bg-light) 0%, var(--success-light) 100%);
        }

        .review-card.incorrect {
            border-left-color: var(--error);
            background: linear-gradient(135deg, var(--bg-light) 0%, var(--error-light) 100%);
        }

        .review-qtext {
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 12px;
            color: var(--text-main);
        }

        .review-item {
            font-size: 14px;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .review-item.correct {
            color: var(--success);
            font-weight: 600;
        }

        .review-item.incorrect {
            color: var(--error);
        }

        .exp-box {
            background: rgba(255,255,255,0.6);
            padding: 12px 16px;
            border-radius: 8px;
            margin-top: 12px;
            font-size: 13px;
            color: var(--text-sub);
            border-left: 3px solid var(--primary);
            line-height: 1.5;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 1024px) {
            .sidebar { width: 260px; }
            .main-content { margin-left: 260px; padding: 30px; }
            .header h1 { font-size: 28px; }
            .qcard { padding: 24px; min-height: 450px; }
        }

        @media (max-width: 768px) {
            .sidebar { width: 100%; height: auto; position: static; border-right: none; border-bottom: 1px solid var(--border); }
            .sidebar-content { flex-direction: row; gap: 20px; }
            .main-content { margin-left: 0; padding: 20px; max-width: 100%; }
            .header h1 { font-size: 24px; }
            .qcard { padding: 20px; min-height: auto; }
            .nav-controls { flex-direction: column; gap: 12px; }
            button { width: 100%; justify-content: center; }
            .result-grid { grid-template-columns: 1fr; }
            .action-buttons { flex-direction: column; }
            .action-buttons .btn-submit { width: 100%; }
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-light); }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">
        <div class="sidebar-logo">
            <img src="jade_logo.webp" alt="Jade Global Logo" class="logo-img">
        </div>
    </div>

    <div class="sidebar-content">
        <div class="timer-section">
            <div class="timer-label">⏱ Time Remaining</div>
            <div id="qtimer" class="timer-value">20:00</div>
        </div>

        <div class="answered-section">
            <div class="answered-label">✓ Answered</div>
            <div class="answered-count" id="ans-num">0 / 20</div>
        </div>

        <nav class="sidebar-nav" style="margin-top: auto;">
            <a href="../index.html">← Exit Assessment</a>
        </nav>
    </div>
</div>

<div class="main-content">
    <div id="quiz-ui">
        <div class="header">
            <div class="badge">📝 Assessment</div>
            <h1>Intermediate Pre-Assessment</h1>
            <p>Test your understanding of advanced LLM concepts. Answer based on what you know now.</p>
        </div>

        <div class="progress-container">
            <div class="progress-info">
                <span class="progress-label">Progress</span>
                <span class="progress-percentage" id="prog-text">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="prog" style="width: 0%"></div>
            </div>
        </div>

        <div id="questions-container"></div>

        <div class="nav-controls">
            <button id="prev-btn" onclick="nav(-1)" disabled>← Previous</button>
            <div id="submit-row">
                <button class="btn-submit" onclick="submitAssessment()">Check My Results →</button>
            </div>
            <button id="next-btn" onclick="nav(1)">Next →</button>
        </div>
    </div>

    <div id="results"></div>
</div>

<script>
const QS = [
    {
        topic:"Prompting", tc:"t-prompt",
        q:"You ask an LLM: 'Write about AI.' The output is too vague. What is the best improvement?",
        opts:["Increase temperature","Add specific instructions and output format","Use a different model","Remove context"],
        ans:1,
        exp:"Vague prompts lead to vague outputs. Adding clear instructions and format improves response quality significantly."
    },
    {
        topic:"Prompting", tc:"t-prompt",
        q:"You want the model to classify sentiment accurately for tricky cases. What should you use?",
        opts:["Zero-shot prompting","Few-shot prompting","High temperature","Short prompts"],
        ans:1,
        exp:"Few-shot prompting provides examples that help the model understand patterns in complex or nuanced tasks."
    },
    {
        topic:"Prompting", tc:"t-prompt",
        q:"A chatbot gives incorrect answers to math problems. What is the most effective fix?",
        opts:["Reduce max tokens","Add 'Let's think step by step'","Increase temperature","Remove examples"],
        ans:1,
        exp:"Chain-of-thought prompting improves reasoning by forcing the model to break down steps."
    },
    {
        topic:"Prompting", tc:"t-prompt",
        q:"You are building a legal assistant. Which prompt is better?",
        opts:["Explain this contract","Summarize this contract","You are a legal expert. Summarize key risks in 3 bullet points.","Tell me about contracts"],
        ans:2,
        exp:"Role + clear instructions + format leads to more useful and domain-specific outputs."
    },
    {
        topic:"Transformers", tc:"t-trans",
        q:"An LLM fails to understand that 'it' refers to 'the dog' in a sentence. Which concept solves this?",
        opts:["Tokenization","Attention mechanism","Output layer","Temperature"],
        ans:1,
        exp:"Attention helps models connect related words across a sentence, enabling better context understanding."
    },
    {
        topic:"Transformers", tc:"t-trans",
        q:"Why is multi-head attention useful?",
        opts:["It reduces model size","It processes tokens sequentially","It captures different relationships in parallel","It removes positional encoding"],
        ans:2,
        exp:"Different attention heads learn different relationships like grammar, meaning, and dependencies."
    },
    {
        topic:"LLM Usage", tc:"t-app",
        q:"You want an LLM to generate creative marketing slogans. What should you adjust?",
        opts:["Increase temperature","Decrease temperature","Decrease max tokens","Add stop sequence"],
        ans:0,
        exp:"Higher temperature increases randomness and creativity in outputs."
    },
    {
        topic:"LLM Usage", tc:"t-app",
        q:"A user asks a chatbot multiple follow-up questions. What helps maintain context?",
        opts:["Tokenization","Conversation history","Lower temperature","Output formatting"],
        ans:1,
        exp:"Maintaining conversation history allows the model to remember prior interactions."
    },
    {
        topic:"Applications", tc:"t-app",
        q:"Which task is best suited for LLMs?",
        opts:["Sorting numbers efficiently","Writing product descriptions","Running database joins","Compressing files"],
        ans:1,
        exp:"LLMs are designed for language-based tasks like writing, summarization, and QA."
    },
    {
        topic:"Prompting", tc:"t-prompt",
        q:"You want structured output like JSON. What should you do?",
        opts:["Increase tokens","Specify output format in prompt","Use zero-shot prompting","Remove instructions"],
        ans:1,
        exp:"Explicitly defining output format ensures the model returns structured data."
    },
    {
        topic:"LLM Behavior", tc:"t-llm",
        q:"A model gives different answers each time for the same factual query. What is the issue?",
        opts:["Low max tokens","High temperature","Missing examples","Poor embeddings"],
        ans:1,
        exp:"High temperature increases randomness, leading to inconsistent outputs."
    },
    {
        topic:"Transformers", tc:"t-trans",
        q:"You are building a translation system using a transformer. Which component generates output?",
        opts:["Encoder","Decoder","Attention layer","Embedding layer"],
        ans:1,
        exp:"The decoder is responsible for generating output tokens step-by-step."
    },
    {
        topic:"Prompting", tc:"t-prompt",
        q:"You want the LLM to behave like a teacher who only asks questions. What should you use?",
        opts:["Few-shot prompting","Role prompting","High temperature","Output parsing"],
        ans:1,
        exp:"Role prompting defines how the model should behave."
    },
    {
        topic:"Prompting", tc:"t-prompt",
        q:"A prompt says: 'Don't make it long.' What is the issue?",
        opts:["Too specific","Negative instruction only","Too many examples","Too structured"],
        ans:1,
        exp:"Negative instructions are unclear. It's better to specify exact constraints."
    },
    {
        topic:"Prompting", tc:"t-prompt",
        q:"You want to break a complex task into steps like Extract → Analyze → Summarize. What technique is this?",
        opts:["Chain-of-thought","Prompt chaining","Few-shot prompting","Zero-shot prompting"],
        ans:1,
        exp:"Prompt chaining breaks tasks into sequential steps for better results."
    },
    {
        topic:"APIs", tc:"t-api",
        q:"Your app calls an LLM API and gets inconsistent creative outputs. Which parameter should you tune?",
        opts:["max_tokens","temperature","stop","role"],
        ans:1,
        exp:"Temperature controls randomness and creativity in outputs."
    },
    {
        topic:"Applications", tc:"t-app",
        q:"You are building a customer support bot. It forgets earlier conversation. What should you add?",
        opts:["Few-shot examples","Conversation memory/history","Lower temperature","More tokens"],
        ans:1,
        exp:"Memory or conversation history helps retain context across interactions."
    },
    {
        topic:"Intermediate Concept", tc:"t-int",
        q:"You want an LLM to answer using your company documents instead of general knowledge. What concept is most relevant?",
        opts:["Tokenization","Prompt engineering","External data retrieval (RAG-like idea)","Temperature tuning"],
        ans:2,
        exp:"RAG allows models to retrieve and use external documents for accurate answers."
    },
    {
        topic:"Prompting", tc:"t-prompt",
        q:"You give multiple examples before asking a question. What are you doing?",
        opts:["Zero-shot prompting","Chain-of-thought","Few-shot prompting","Role prompting"],
        ans:2,
        exp:"Few-shot prompting uses examples to guide model behavior."
    },
    {
        topic:"Intermediate Concept", tc:"t-int",
        q:"You are building a semantic search system based on meaning. What concept will you most likely need?",
        opts:["Positional encoding","Embeddings","Temperature","Stop tokens"],
        ans:1,
        exp:"Embeddings convert text into vectors, enabling semantic similarity search."
    }
];

let current = 0;
let answered = {};
let submitted = false;
let timeLeft = 20 * 60;
let timerInt;

function buildQuestions() {
    const c = document.getElementById('questions-container');
    QS.forEach((q, i) => {
        const d = document.createElement('div');
        d.className = 'qcard' + (i === 0 ? ' active' : '');
        d.id = 'q' + i;
        d.innerHTML = `
            <div class="qcard-header">
                <div class="topic-label">📌 ${q.topic}</div>
                <div class="qnum">Question ${i+1} of ${QS.length}</div>
                <div class="qtext">${q.q}</div>
            </div>
            <div class="qcard-content">
                <div class="options" id="opts${i}">
                    ${q.opts.map((o, j) => `
                        <div class="opt" id="opt${i}_${j}" onclick="selectOpt(${i},${j})">
                            <div class="olabel">${String.fromCharCode(65+j)}</div>
                            <div class="otext">${o}</div>
                        </div>`).join('')}
                </div>
            </div>`;
        c.appendChild(d);
    });
}

function selectOpt(qi, oi) {
    if (submitted) return;
    answered[qi] = oi;
    document.querySelectorAll(`#opts${qi} .opt`).forEach((el, j) => el.classList.toggle('selected', j === oi));
    
    const answeredCount = Object.keys(answered).length;
    document.getElementById('ans-num').textContent = `${answeredCount} / ${QS.length}`;
    
    const progPct = Math.round((answeredCount / QS.length) * 100);
    document.getElementById('prog').style.width = progPct + '%';
    document.getElementById('prog-text').textContent = progPct + '%';
    
    if (answeredCount >= 15) {
        document.getElementById('submit-row').style.display = 'block';
    }
}

function nav(dir) {
    document.getElementById('q' + current).classList.remove('active');
    current = Math.max(0, Math.min(QS.length - 1, current + dir));
    document.getElementById('q' + current).classList.add('active');
    document.getElementById('prev-btn').disabled = (current === 0);
    document.getElementById('next-btn').disabled = (current === QS.length - 1);
}

function submitAssessment() {
    if(submitted) return;
    submitted = true;
    clearInterval(timerInt);
    localStorage.setItem('int_pre_completed', 'true');
    showResults();
}

function showResults() {
    document.getElementById('quiz-ui').style.display = 'none';
    const r = document.getElementById('results');
    r.style.display = 'block';
    
    let correct = 0;
    QS.forEach((q, i) => { if (answered[i] === q.ans) correct++; });
    const pct = Math.round((correct / QS.length) * 100);

    const timeSpentSec = (20 * 60) - timeLeft;
    const m = Math.floor(timeSpentSec / 60), s = timeSpentSec % 60;
    const timeStr = `${m}:${s < 10 ? '0' : ''}${s}`;

    r.innerHTML = `
        <div class="results-header">
            <h2>🎉 Pre-Assessment Complete</h2>
            <div class="score-big">${pct}%</div>
            <p class="results-subtitle">Baseline set. Intermediate learning content is now unlocked.</p>
        </div>

        <div class="result-grid">
            <div class="stat-card">
                <div class="stat-value">${correct}</div>
                <div class="stat-label">Correct</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">${QS.length - correct}</div>
                <div class="stat-label">Incorrect</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">${timeStr}</div>
                <div class="stat-label">Time Taken</div>
            </div>
        </div>

        <div class="action-buttons">
            <button class="btn-submit" onclick="window.location.href='int_content.html'">📚 Go to Learning Content →</button>
        </div>

        <div class="review-section">
            <h3>📋 Review Your Answers</h3>
            ${QS.map((q, i) => {
                const ua = answered[i];
                const ok = ua === q.ans;
                return `
                <div class="review-card ${ok ? 'correct' : 'incorrect'}">
                    <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 12px;">
                        <span style="font-size: 18px;">${ok ? '✓' : '✗'}</span>
                        <div class="review-qtext">Question ${i + 1}</div>
                    </div>
                    <div style="font-weight: 600; margin-bottom: 12px; color: var(--text-main);">${q.q}</div>
                    <div class="review-item">Your Answer: <strong>${ua !== undefined ? q.opts[ua] : 'Not answered'}</strong></div>
                    ${!ok ? `<div class="review-item correct">✓ Correct: ${q.opts[q.ans]}</div>` : ''}
                    <div class="exp-box">💡 ${q.exp}</div>
                </div>`;
            }).join('')}
        </div>
    `;
}

function startTimer() {
    timerInt = setInterval(() => {
        timeLeft--;
        const m = Math.floor(timeLeft / 60), s = timeLeft % 60;
        const timerDisplay = document.getElementById('qtimer');
        timerDisplay.textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
        
        if (timeLeft <= 60) {
            timerDisplay.classList.add('warning');
        }
        if (timeLeft <= 30) {
            timerDisplay.classList.remove('warning');
            timerDisplay.classList.add('critical');
        }
        
        if (timeLeft <= 0) {
            clearInterval(timerInt);
            alert("⏱ Time is up! Submitting your answers...");
            submitAssessment();
        }
    }, 1000);
}

window.onload = function() {
    buildQuestions();
    startTimer();
}
</script>
</body>
</html>
