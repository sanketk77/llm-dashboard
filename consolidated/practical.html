<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Engineering Assignment</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/dracula.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/python/python.min.js"></script>

    <style>
        :root {
            --primary: #1a73e8;
            --primary-light: #e8f0fe;
            --primary-dark: #1557b0;
            --success: #1e8e3e;
            --success-light: #f1f8e9;
            --warning: #f57c00;
            --error: #d32f2f;
            --error-light: #ffebee;
            --bg: #f8f9fa;
            --bg-light: #ffffff;
            --text-main: #202124;
            --text-sub: #5f6368;
            --text-light: #80868b;
            --border: #dadce0;
            --code-bg: #282c34;
            --shadow: 0 2px 8px rgba(0,0,0,0.1);
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }

        html, body {
            height: 100%;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #f8f9fa 0%, #f0f4f8 100%);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 280px;
            background: var(--bg-light);
            border-right: 1px solid var(--border);
            padding: 0;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 24px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(135deg, #f8f9fa 0%, #ffffff 100%);
        }

        .sidebar-logo {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .logo-img {
            width: 160px;
            height: auto;
            display: block;
            filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.1));
            transition: transform 0.3s ease;
        }

        .logo-img:hover {
            transform: scale(1.05);
        }

        .sidebar-content {
            padding: 30px 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .progress-section {
            background: linear-gradient(135deg, var(--primary-light) 0%, #f0f7ff 100%);
            padding: 20px;
            border-radius: 12px;
            border-left: 4px solid var(--primary);
        }

        .progress-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .progress-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
        }

        .progress-bar-small {
            width: 100%;
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            margin-top: 12px;
            overflow: hidden;
        }

        .progress-fill-small {
            height: 100%;
            background: linear-gradient(90deg, var(--primary) 0%, var(--primary-dark) 100%);
            transition: width 0.4s ease;
        }

        .sidebar-nav {
            margin-top: auto;
        }

        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            text-decoration: none;
            color: var(--text-main);
            border-radius: 8px;
            transition: all 0.3s ease;
            font-size: 14px;
            font-weight: 500;
        }

        .sidebar-nav a:hover {
            background: var(--primary-light);
            color: var(--primary);
            transform: translateX(-4px);
        }

        /* ===== MAIN CONTENT ===== */
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 40px;
            overflow-y: auto;
            max-width: 1100px;
        }

        .header {
            margin-bottom: 40px;
            animation: fadeInDown 0.5s ease;
        }

        .badge {
            display: inline-block;
            font-size: 11px;
            font-weight: 700;
            padding: 6px 14px;
            border-radius: 20px;
            background: linear-gradient(135deg, var(--primary-light) 0%, #d2e3fc 100%);
            color: var(--primary);
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 2px 4px rgba(26, 115, 232, 0.1);
        }

        .header h1 {
            font-size: 36px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .header p {
            font-size: 16px;
            color: var(--text-sub);
            line-height: 1.6;
        }

        /* ===== ASSIGNMENT CARD ===== */
        .assignment-card {
            background: var(--bg-light);
            border-radius: 16px;
            padding: 32px;
            box-shadow: var(--shadow);
            display: none;
            border: 1px solid var(--border);
            animation: fadeIn 0.4s ease;
        }

        .assignment-card.active {
            display: block;
        }

        .task-topic {
            display: inline-block;
            font-size: 11px;
            font-weight: 700;
            padding: 6px 14px;
            border-radius: 6px;
            background: var(--primary-light);
            color: var(--primary);
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .instruction {
            font-size: 16px;
            line-height: 1.6;
            color: var(--text-main);
            margin-bottom: 24px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
            border-left: 4px solid var(--primary);
        }

        .editor-section {
            margin-bottom: 24px;
        }

        .editor-label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .editor-info {
            font-size: 12px;
            color: var(--text-light);
            margin-bottom: 8px;
        }

        /* ===== CODE EDITOR ===== */
        .editor-wrapper {
            border: 2px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--shadow);
            background: var(--code-bg);
        }

        .CodeMirror {
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', 'Courier New', monospace !important;
            font-size: 14px !important;
            height: 300px !important;
            background: var(--code-bg) !important;
        }

        .CodeMirror-linenumber {
            color: #666 !important;
        }

        /* ===== ERROR/SUCCESS MESSAGES ===== */
        .editor-status {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 8px;
            margin-top: 12px;
            font-size: 13px;
            font-weight: 600;
            display: none;
        }

        .editor-status.show {
            display: flex;
        }

        .editor-status.warning {
            background: linear-gradient(135deg, #fff3e0 0%, #ffe0b2 100%);
            color: var(--warning);
            border-left: 4px solid var(--warning);
        }

        .editor-status.error {
            background: linear-gradient(135deg, var(--error-light) 0%, #ffcdd2 100%);
            color: var(--error);
            border-left: 4px solid var(--error);
        }

        .editor-status.success {
            background: linear-gradient(135deg, var(--success-light) 0%, #c8e6c9 100%);
            color: var(--success);
            border-left: 4px solid var(--success);
        }

        /* ===== SOLUTION BOX ===== */
        .solution-box {
            display: none;
            background: linear-gradient(135deg, var(--success-light) 0%, #f1f8e9 100%);
            padding: 24px;
            border-radius: 12px;
            border-left: 5px solid var(--success);
            box-shadow: var(--shadow);
            margin-top: 24px;
        }

        .solution-box.show {
            display: block;
            animation: slideDown 0.4s ease;
        }

        .solution-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--success);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
        }

        .solution-code {
            background: var(--code-bg);
            padding: 16px;
            border-radius: 8px;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', 'Courier New', monospace;
            font-size: 13px;
            color: #abb2bf;
            line-height: 1.6;
            overflow-x: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .solution-explanation {
            margin-top: 16px;
            font-size: 13px;
            color: #0d652d;
            line-height: 1.6;
        }

        /* ===== IDE BUTTONS ===== */
        .ide-section {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .ide-btn {
            flex: 1;
            padding: 12px 16px;
            border-radius: 8px;
            border: 2px solid var(--border);
            background: var(--bg-light);
            color: var(--text-main);
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
        }

        .ide-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: var(--primary-light);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(26, 115, 232, 0.2);
        }

        /* ===== CONTROLS ===== */
        .controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
            flex-wrap: wrap;
        }

        button {
            padding: 12px 28px;
            border-radius: 8px;
            border: 2px solid var(--border);
            background: var(--bg-light);
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            min-height: 44px;
            color: var(--text-main);
        }

        button:hover:not(:disabled) {
            border-color: var(--primary);
            color: var(--primary);
            background: var(--primary-light);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(26, 115, 232, 0.2);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            box-shadow: 0 4px 12px rgba(26, 115, 232, 0.3);
            font-weight: 700;
        }

        .btn-primary:hover {
            box-shadow: 0 6px 16px rgba(26, 115, 232, 0.4);
            transform: translateY(-2px);
        }

        .btn-success {
            background: linear-gradient(135deg, var(--success) 0%, #2e7d32 100%);
            color: white;
            border: none;
            box-shadow: 0 4px 12px rgba(30, 142, 62, 0.3);
            font-weight: 700;
        }

        .btn-success:hover {
            box-shadow: 0 6px 16px rgba(30, 142, 62, 0.4);
            transform: translateY(-2px);
        }

        #next-btn {
            display: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 1024px) {
            .sidebar { width: 260px; }
            .main-content { margin-left: 260px; padding: 30px; }
            .header h1 { font-size: 28px; }
        }

        @media (max-width: 768px) {
            .sidebar { width: 100%; height: auto; position: static; border-right: none; border-bottom: 1px solid var(--border); }
            .sidebar-content { flex-direction: row; gap: 20px; }
            .main-content { margin-left: 0; padding: 20px; max-width: 100%; }
            .header h1 { font-size: 24px; }
            .assignment-card { padding: 20px; }
            .controls { flex-direction: column; }
            button { width: 100%; justify-content: center; }
            .ide-section { flex-direction: column; }
            .CodeMirror { height: 250px !important; }
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-light); }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">
        <div class="sidebar-logo">
            <img src="jade_logo.webp" alt="Jade Global Logo" class="logo-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
            <div style="display:none; font-weight: 800; color: var(--primary); font-size: 1.2rem; letter-spacing: -0.5px;">JADE GLOBAL</div>
        </div>
    </div>

    <div class="sidebar-content">
        <div class="progress-section">
            <div class="progress-label">📝 Task Progress</div>
            <div class="progress-value" id="progress-text">1 / 10</div>
            <div class="progress-bar-small">
                <div class="progress-fill-small" id="progress-fill" style="width: 10%"></div>
            </div>
        </div>

        <nav class="sidebar-nav" style="margin-top: auto;">
            <a href="../index.html">← Exit Assignment</a>
        </nav>
    </div>
</div>

<div class="main-content">
    <div class="header">
        <div class="badge">💻 Comprehensive Training</div>
        <h1>LLM Engineering Workflows</h1>
        <p>Complete all 10 practical coding tasks. Submit your answer to view the best-practice solution.</p>
    </div>

    <div id="assignment-container"></div>

    <div class="controls">
        <button id="prev-btn" onclick="move(-1)" disabled>← Previous</button>
        <button id="submit-code-btn" class="btn-success" onclick="submitCode()">Submit & Review →</button>
        <button id="next-btn" class="btn-primary" onclick="move(1)">Next Task →</button>
    </div>
</div>

<script>
    // 10 Key LLM Engineering Tasks
    const tasks = [
        {
            topic: "Autonomous Support Agent Loop",
            instruction: "Write a script that mimics an agent's \"brain\" by deciding which tool to call based on user input, rather than just returning text. Create a Python function support_agent(). Assume you have two mock tool functions: check_order(order_id) and send_discount(email). Use conditional keywords (e.g., \"order\" or \"discount\") to simulate the agent \"thinking\" and routing to a tool. If no keywords match, return a \"fallback\" message. Wrap this in a while True loop to allow for continuous user interaction until \"exit\" is typed.",
            solution: "def support_agent():\n    while True:\n        ui = input('Ask: ').lower()\n        if ui == 'exit': break\n        print('Checking order...' if 'order' in ui else 'Discount sent!' if 'discount' in ui else 'Fallback: How can I help?')",
            explanation: "The loop maintains an active session, while conditional statements act as a primitive routing mechanism, mimicking an agent's reasoning process to select the right 'tool'.",
            hint: "Use a while True loop with input() and simple if/elif/else statements for routing based on keywords."
        },
        {
            topic: "RAG Pipeline: Recursive Chunking",
            instruction: "Build the foundation of a system capable of answering questions about a private document while minimizing broken context. Using LangChain, instantiate a PyPDFLoader. Then, use the RecursiveCharacterTextSplitter to chunk the text into 500-character segments with a 50-character overlap to preserve structural meaning. Finally, configure a mock RetrievalQA chain to retrieve exactly 4 relevant chunks per query.",
            solution: "from langchain.text_splitter import RecursiveCharacterTextSplitter\n# loader = PyPDFLoader('doc.pdf'); docs = loader.load()\nsplitter = RecursiveCharacterTextSplitter(chunk_size=500, chunk_overlap=50)\n# chunks = splitter.split_documents(docs)\n# qa = RetrievalQA.from_chain_type(retriever=db.as_retriever(search_kwargs={'k': 4}))",
            explanation: "Recursive chunking preserves sentence structures better than basic splitting. The overlap ensures critical context isn't lost at the boundaries of the chunks.",
            hint: "Set chunk_size=500 and chunk_overlap=50 in the text splitter. Use search_kwargs={'k': 4} for the retriever."
        },
        {
            topic: "Multi-Stage Prompt Chaining",
            instruction: "Prevent information loss in long documents by breaking the process into smaller, manageable steps. Define a two-step chain using Python f-strings as templates. Step 1: Create extract_facts_prompt that takes a raw_article and returns a list of data points. Step 2: Create summarize_prompt that takes the output of Step 1 and an audience variable (e.g., \"Manager\") to generate a 3-bullet point summary. Programmatically show how output 1 is passed to prompt 2.",
            solution: "extract_prompt = f'Extract facts from: {raw_article}'\nextracted_data = llm_call(extract_prompt) # First LLM execution\naudience = 'Manager'\nsummary_prompt = f'Summarize for {audience} in 3 bullets: {extracted_data}'\nfinal_summary = llm_call(summary_prompt)",
            explanation: "Prompt chaining breaks down complex reasoning tasks. Extracting facts first reduces hallucination, and summarizing the facts ensures targeted outputs.",
            hint: "Use two separate f-strings. The second f-string should interpolate the variable storing the result of the first."
        },
        {
            topic: "API Hyperparameter Configuration",
            instruction: "Tune the LLM's hyperparameters via the API to suit specific use cases. Write two separate mock OpenAI API configurations using client.chat.completions.create. Call A (Precise): Configure a request for a factual Q&A bot with a temperature of 0.0 and max_tokens of 100. Call B (Creative): Configure a request for a brainstorming tool with a temperature of 1.2. Include a stop sequence parameter ([\"\\n\\n\"]) in both to prevent the model from generating more than one paragraph.",
            solution: "# Precise Call\nclient.chat.completions.create(model='gpt-4', temp=0.0, max_tokens=100, stop=['\\n\\n'])\n# Creative Call\nclient.chat.completions.create(model='gpt-4', temp=1.2, stop=['\\n\\n'])",
            explanation: "Temperature controls randomness (low for facts, high for creativity). Stop sequences prevent runaway generation and save token costs.",
            hint: "Pass temperature, max_tokens, and stop as arguments to the API creation method."
        },
        {
            topic: "Stateful Conditional Routing",
            instruction: "Move beyond linear chains to workflows that branch based on LLM decisions (LangGraph style). Define a Python dictionary State that tracks a list of messages and a user_intent string. Write a mock node function search_flights(state) that appends 'Searching...' to messages. Then, write a lambda function simulating conditional edges: if the state's intent is \"booking\", return \"book_node\", otherwise \"cancel_node\".",
            solution: "state = {'messages': [], 'user_intent': 'booking'}\ndef search_flights(state):\n    return {'messages': state['messages'] + ['Searching...']}\nrouter = lambda state: 'book_node' if state['user_intent'] == 'booking' else 'cancel_node'",
            explanation: "Graph architectures manage cyclical and conditional agent behaviors by passing and mutating a shared state dictionary between distinct functional nodes.",
            hint: "Use a simple Python dictionary for state. The router is a lambda that checks the value of state['user_intent']."
        },
        {
            topic: "PII Scrubbing Input Guardrail",
            instruction: "Protect personal data before it leaves your local infrastructure. Write a function scrub_pii(text) using Python's re library. Use regex patterns to replace email addresses with [EMAIL] and 10-digit phone numbers with [PHONE]. Then, create a wrapper function safe_llm_call(user_input) that scrubs the input, executes a mock LLM call, and performs an output check to replace the response with 'Censored' if it contains the word 'competitor'.",
            solution: "import re\ndef scrub_pii(text):\n    text = re.sub(r'\\S+@\\S+', '[EMAIL]', text)\n    return re.sub(r'\\b\\d{10}\\b', '[PHONE]', text)\ndef safe_llm_call(user_input):\n    out = llm_call(scrub_pii(user_input))\n    return 'Censored' if 'competitor' in out else out",
            explanation: "Input/output guardrails are critical for enterprise security, ensuring sensitive data isn't leaked to external APIs and competitors aren't mentioned.",
            hint: "Use re.sub(pattern, replacement, text) for both the email and the phone number (\\b\\d{10}\\b)."
        },
        {
            topic: "Vector Similarity Calculation",
            instruction: "Understand the math of how vector databases rank results. Using numpy and cosine_similarity from sklearn, write a function that takes a query_vector and a list of document_vectors. Calculate the cosine similarity scores for all pairs. Use np.argmax to identify and print the index of the most relevant document based on the highest similarity score.",
            solution: "import numpy as np\nfrom sklearn.metrics.pairwise import cosine_similarity\ndef get_best_match(query_vec, doc_vecs):\n    scores = cosine_similarity(np.array(query_vec).reshape(1, -1), doc_vecs)\n    best_idx = np.argmax(scores)\n    print(f'Most relevant doc index: {best_idx}')",
            explanation: "Cosine similarity measures the angle between two vectors. A smaller angle means higher semantic similarity, allowing databases to rank search results.",
            hint: "Ensure the query vector is a 2D array by using .reshape(1, -1) before passing it into the cosine_similarity function."
        },
        {
            topic: "Multi-Agent Orchestrator",
            instruction: "Organize teams of agents to solve complex problems faster. Design the logic for a 'Supervisor' agent that receives a goal. Define a workflow where the Supervisor concatenates data from a web_scraper_agent() and a financial_agent(). Pass this combined data to a generate_report() function. Finally, wrap the generation in a while loop that requires a quality_agent(report) to return True (approved) before returning the final report.",
            solution: "def supervisor_agent(goal):\n    raw_data = web_scraper_agent(goal) + financial_agent(goal)\n    approved = False\n    while not approved:\n        report = generate_report(raw_data)\n        approved = quality_agent(report)\n    return report",
            explanation: "Supervisor architectures divide tasks, reducing the cognitive load on a single prompt and enforcing programmatic quality gates before showing output.",
            hint: "Combine the outputs of the scraper and financial agents. Use a while not approved: loop to enforce the quality check."
        },
        {
            topic: "Resilience: Exponential Backoff",
            instruction: "Ensure your application remains reliable in production despite API rate limits. Write a Python function call_with_retry(prompt, retries=3). Use a try/except block to catch a mock Exception (simulating RateLimitError). Inside the exception, calculate a wait time using the formula $2^{attempt}$ (e.g., 1s, 2s, 4s) and use time.sleep() before the next iteration. Raise an exception if all retries fail.",
            solution: "import time\ndef call_with_retry(prompt, retries=3):\n    for attempt in range(retries):\n        try: return mock_api_call(prompt)\n        except Exception:\n            time.sleep(2 ** attempt)\n    raise Exception('Max retries failed')",
            explanation: "Exponential backoff prevents overwhelming a struggling API server and handles transient network issues gracefully without crashing the application.",
            hint: "Use a for attempt in range(retries): loop. The sleep time calculation is simply 2 ** attempt."
        },
        {
            topic: "Token Streaming to Console",
            instruction: "Eliminate 'blank screen' wait times by handling the API's token stream. Assume an OpenAI API call is made with stream=True, returning an iterable 'response'. Write a for loop to iterate through the chunks in the response. Extract chunk.choices[0].delta.content. Use the print() function with end=\"\" and flush=True to ensure the text appears character-by-character on a single line in real-time.",
            solution: "# response = client.chat.completions.create(..., stream=True)\nfor chunk in response:\n    content = chunk.choices[0].delta.content\n    if content is not None:\n        print(content, end='', flush=True)",
            explanation: "Streaming drastically improves perceived user latency by showing the LLM's output sequentially as it's being generated, rather than waiting for the entire block.",
            hint: "Check if content is not None before printing. Setting end='' prevents print from automatically starting a new line."
        }
    ];

    let current = 0;
    let editors = {};

    // ONLOAD TRIGGER
    window.onload = function() {
        buildTasks();
        initializeEditors();
    };

    function buildTasks() {
        const container = document.getElementById('assignment-container');
        container.innerHTML = ''; 
        
        tasks.forEach((t, i) => {
            const div = document.createElement('div');
            div.className = `assignment-card ${i === 0 ? 'active' : ''}`;
            div.id = `task-${i}`;
            div.innerHTML = `
                <div class="task-topic">📌 ${t.topic}</div>
                
                <div class="instruction">
                    <strong>Task:</strong> ${t.instruction}
                </div>

                <div class="editor-section">
                    <label class="editor-label">✏️ Code Editor</label>
                    <div class="editor-info">Max 15 lines • Python syntax highlighting</div>
                    <div class="editor-wrapper">
                        <textarea id="editor-${i}" class="code-input"></textarea>
                    </div>
                    <div class="editor-status" id="status-${i}"></div>
                </div>

                <div class="ide-section">
                    <a href="https://replit.com/new/python" target="_blank" class="ide-btn">
                        🌐 Try on Replit
                    </a>
                    <a href="https://www.online-python.com/" target="_blank" class="ide-btn">
                        💻 Online IDE
                    </a>
                </div>

                <div class="solution-box" id="sol-${i}">
                    <div class="solution-title">✓ Model Solution</div>
                    <div class="solution-code">${t.solution}</div>
                    <div class="solution-explanation"><strong>Why:</strong> ${t.explanation}</div>
                </div>
            `;
            container.appendChild(div);
        });
    }

    function initializeEditors() {
        tasks.forEach((t, i) => {
            editors[i] = CodeMirror.fromTextArea(document.getElementById(`editor-${i}`), {
                mode: 'python',
                theme: 'dracula',
                lineNumbers: true,
                indentUnit: 4,
                indentWithTabs: false,
                lineWrapping: true
            });

            // Limit paste to 15 lines to account for advanced tasks
            editors[i].on('paste', (instance, event) => {
                const clipboardData = event.clipboardData || window.clipboardData;
                const pastedText = clipboardData.getData('Text');
                const lines = pastedText.split('\n').filter(l => l.trim());
                
                if (lines.length > 15) {
                    event.preventDefault();
                    showStatus(i, 'error', '❌ Max 15 lines allowed! Paste reduced.');
                    const truncated = lines.slice(0, 15).join('\n');
                    instance.replaceSelection(truncated);
                } else {
                    showStatus(i, 'success', '✓ Paste successful');
                }
            });

            // Monitor line count
            editors[i].on('change', (instance) => {
                const lines = instance.lineCount();
                if (lines > 15) {
                    showStatus(i, 'warning', `⚠️ ${lines} lines (max 15). Consider condensing.`);
                } else if (lines > 0) {
                    showStatus(i, 'success', `✓ ${lines} line${lines > 1 ? 's' : ''} entered`);
                } else {
                    clearStatus(i);
                }
            });
        });
        
        // Ensure the first editor renders correctly immediately
        setTimeout(() => editors[0].refresh(), 100);
    }

    function showStatus(i, type, message) {
        const status = document.getElementById(`status-${i}`);
        status.className = `editor-status show ${type}`;
        status.textContent = message;
    }

    function clearStatus(i) {
        const status = document.getElementById(`status-${i}`);
        status.classList.remove('show');
    }

    function submitCode() {
        const code = editors[current].getValue();
        const lines = code.split('\n').filter(l => l.trim()).length;

        if (lines === 0) {
            showStatus(current, 'error', '❌ Please write some code first');
            return;
        }

        // Show solution
        document.getElementById(`sol-${current}`).classList.add('show');
        document.getElementById('submit-code-btn').style.display = 'none';
        document.getElementById('next-btn').style.display = 'flex';

        // Update button text if last task
        if (current === tasks.length - 1) {
            const nextBtn = document.getElementById('next-btn');
            nextBtn.textContent = "✓ Finish & Return to Dashboard";
            nextBtn.classList.remove('btn-primary');
            nextBtn.classList.add('btn-success');
            
            nextBtn.onclick = () => {
                localStorage.setItem('comprehensive_module_fully_completed', 'true');
                window.location.href = 'index.html'; 
            };
        }

        showStatus(current, 'success', '✓ Great! Review the solution below.');
    }

    function move(dir) {
        // Hide current task
        document.getElementById(`task-${current}`).classList.remove('active');
        clearStatus(current);
        
        // Update index
        current = Math.max(0, Math.min(tasks.length - 1, current + dir));
        
        // Show new task
        document.getElementById(`task-${current}`).classList.add('active');
        
        // UI Updates
        const progress = Math.round(((current + 1) / tasks.length) * 100);
        document.getElementById('progress-text').textContent = `${current + 1} / ${tasks.length}`;
        document.getElementById('progress-fill').style.width = progress + '%';
        document.getElementById('prev-btn').disabled = (current === 0);
        
        // Reset buttons
        document.getElementById('submit-code-btn').style.display = 'flex';
        document.getElementById('next-btn').style.display = 'none';

        // Refresh editor so CodeMirror renders properly when un-hidden
        setTimeout(() => editors[current].refresh(), 50);
    }
</script>

</body>
</html>
